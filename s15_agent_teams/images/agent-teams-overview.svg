<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 528" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="528" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="410" y="30" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Agent Teams — Lead Loop + Teammate Threads + MessageBus</text>
  <text x="410" y="48" fill="#888888" font-size="12" text-anchor="middle">Multi-agent collaboration via file-based inboxes</text>

  <!-- ===== Lead Agent Loop ===== -->
  <rect x="20" y="66" width="780" height="100" rx="8" fill="#fafafa" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="40" y="84" fill="#1a1a1a" font-size="14" font-weight="700">Lead Agent Loop</text>

  <rect x="40" y="96" width="90" height="44" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="85" y="122" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">cron_queue</text>
  <line x1="130" y1="118" x2="148" y2="118" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="156" y="96" width="90" height="44" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="201" y="122" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">messages</text>
  <line x1="246" y1="118" x2="264" y2="118" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="272" y="96" width="110" height="44" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="327" y="122" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">prompt + cache</text>
  <line x1="382" y1="118" x2="400" y2="118" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="408" y="96" width="80" height="44" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="448" y="122" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">LLM call</text>
  <line x1="488" y1="118" x2="506" y2="118" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="514" y="90" width="270" height="56" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="649" y="108" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle">TOOL DISPATCH</text>
  <text x="530" y="124" fill="#888888" font-size="10" font-family="monospace">bash read write task cron</text>
  <text x="530" y="138" fill="#22c55e" font-size="10" font-family="monospace">spawn_teammate send_message check_inbox</text>

  <!-- Loop-back (routed INSIDE the Lead box, away from the Bus) -->
  <path d="M 784 118 L 794 118 L 794 156 L 85 156 L 85 140" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <circle cx="784" cy="118" r="3" fill="#22c55e"/>
  <text x="430" y="152" fill="#888888" font-size="10" text-anchor="middle">loop back: tool_results -&gt; next turn</text>

  <!-- ===== Lead <-> MessageBus (lead is a Bus participant) ===== -->
  <!-- receive: Bus -> Lead (check_inbox reads lead.jsonl) -->
  <path d="M 300 210 L 300 166" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <circle cx="300" cy="210" r="3" fill="#22c55e"/>
  <text x="294" y="192" fill="#22c55e" font-size="10" font-weight="600" text-anchor="end">check_inbox</text>
  <!-- send: Lead -> Bus (send_message to teammate inbox) -->
  <path d="M 360 166 L 360 210" fill="none" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="366" y="192" fill="#888888" font-size="10">send_message</text>

  <!-- ===== spawn: Lead -> teammates (creates thread), routed on the right margin ===== -->
  <path d="M 700 166 L 700 184 L 796 184 L 796 322 L 772 322" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <circle cx="700" cy="166" r="3" fill="#22c55e"/>
  <text x="692" y="180" fill="#22c55e" font-size="10" font-weight="600" text-anchor="end">spawn_teammate</text>
  <text x="692" y="192" fill="#888888" font-size="9" text-anchor="end">creates teammate thread</text>

  <!-- ===== MessageBus ===== -->
  <rect x="60" y="212" width="700" height="38" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="410" y="236" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">MessageBus</text>
  <text x="555" y="236" fill="#888888" font-size="11" font-family="monospace">.mailboxes/*.jsonl</text>

  <!-- ===== Bus <-> teammates ===== -->
  <path d="M 160 252 L 160 288" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="152" y="276" fill="#22c55e" font-size="10" font-weight="600" text-anchor="end">receive</text>
  <path d="M 200 288 L 200 252" fill="none" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="212" y="276" fill="#888888" font-size="10">send</text>

  <path d="M 400 252 L 400 288" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="392" y="276" fill="#22c55e" font-size="10" font-weight="600" text-anchor="end">receive</text>
  <path d="M 440 288 L 440 252" fill="none" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="452" y="276" fill="#888888" font-size="10">send</text>

  <path d="M 630 252 L 630 288" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="622" y="276" fill="#22c55e" font-size="10" font-weight="600" text-anchor="end">receive</text>
  <path d="M 670 288 L 670 252" fill="none" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="682" y="276" fill="#888888" font-size="10">send</text>

  <!-- ===== Teammates (parallel: role + task) ===== -->
  <rect x="60" y="290" width="230" height="66" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="175" y="312" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle">alice (Backend)</text>
  <rect x="72" y="322" width="206" height="26" rx="4" fill="#2d2d2d"/>
  <text x="175" y="339" fill="#22c55e" font-size="10" font-family="monospace" text-anchor="middle">task: create DB schema</text>

  <rect x="300" y="290" width="230" height="66" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="415" y="312" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle">bob (Frontend)</text>
  <rect x="312" y="322" width="206" height="26" rx="4" fill="#2d2d2d"/>
  <text x="415" y="339" fill="#22c55e" font-size="10" font-family="monospace" text-anchor="middle">task: write API client</text>

  <rect x="540" y="290" width="230" height="66" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="655" y="312" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle">charlie (QA)</text>
  <rect x="552" y="322" width="206" height="26" rx="4" fill="#2d2d2d"/>
  <text x="655" y="339" fill="#22c55e" font-size="10" font-family="monospace" text-anchor="middle">task: run tests, report</text>

  <!-- shared teammate properties (applies to all, not just one box) -->
  <text x="410" y="372" fill="#888888" font-size="10" text-anchor="middle">Each teammate: own daemon Thread + own agent_loop (shared client) · max 10 rounds · cannot spawn others</text>

  <!-- ===== Permission Bubbling ===== -->
  <rect x="60" y="386" width="700" height="74" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="80" y="406" fill="#1a1a1a" font-size="12" font-weight="700">Permission Bubbling</text>
  <text x="220" y="406" fill="#888888" font-size="11">(omitted in teaching code, present in production)</text>
  <rect x="72" y="416" width="676" height="36" rx="4" fill="#2d2d2d"/>
  <text x="82" y="432" fill="#22c55e" font-size="10" font-family="monospace">1. Teammate needs approval -> sends permission_request via Bus</text>
  <text x="82" y="446" fill="#22c55e" font-size="10" font-family="monospace">2. Lead receives -> user approves -> sends permission_response back</text>

  <!-- perm_request arrow: teammate area up to Bus (left margin) -->
  <path d="M 60 360 L 34 360 L 34 230 L 60 230" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <circle cx="60" cy="360" r="3" fill="#22c55e"/>
  <text x="47" y="300" fill="#22c55e" font-size="9" font-weight="600" text-anchor="middle" transform="rotate(-90 47 300)">perm_request</text>

  <!-- ===== Summary bar ===== -->
  <rect x="60" y="482" width="700" height="32" rx="8" fill="#fafafa" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="410" y="502" fill="#888888" font-size="11" text-anchor="middle">Lead tools: bash, read, write, task(5), cron(3), spawn_teammate, send_message, check_inbox (14 total)</text>
</svg>
