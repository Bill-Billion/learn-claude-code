<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="340" fill="#ffffff"/>

  <!-- Title -->
  <text x="380" y="28" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Team Topology</text>
  <text x="380" y="46" fill="#888888" font-size="12" text-anchor="middle">Lead ↔ MessageBus ↔ Teammates</text>

  <!-- Lead Agent box: 220px wide, centered at x=380 => x=270..490, y=64..132 -->
  <rect x="270" y="64" width="220" height="68" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="380" y="88" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Lead Agent</text>
  <text x="380" y="106" fill="#888888" font-size="11" text-anchor="middle">main loop + spawn + inbox</text>
  <text x="380" y="120" fill="#888888" font-size="11" text-anchor="middle">check_inbox for teammate msgs</text>

  <!-- Arrows: Lead ↔ Bus -->
  <!-- Lead → Bus (send): left arrow at x=340 -->
  <line x1="340" y1="132" x2="340" y2="174" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="318" y="155" fill="#22c55e" font-size="10" font-weight="600">send</text>

  <!-- Bus → Lead (inbox): right arrow at x=420 -->
  <line x1="420" y1="174" x2="420" y2="132" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="428" y="155" fill="#22c55e" font-size="10" font-weight="600">inbox</text>

  <!-- Message Bus: full width bar, y=174..202 -->
  <rect x="60" y="174" width="640" height="28" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="380" y="193" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle">MessageBus</text>
  <text x="575" y="193" fill="#888888" font-size="10" text-anchor="middle">.mailboxes/*.jsonl</text>

  <!-- Arrows: Bus ↔ Teammates -->
  <!-- Alice: receive (solid green down) at x=130, send (dashed green up) at x=160 -->
  <line x1="130" y1="202" x2="130" y2="250" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="92" y="228" fill="#22c55e" font-size="10" font-weight="600">receive</text>
  <line x1="165" y1="250" x2="165" y2="202" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="172" y="228" fill="#22c55e" font-size="10" font-weight="600">send</text>

  <!-- Bob: receive at x=355, send at x=405 -->
  <line x1="355" y1="202" x2="355" y2="250" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="317" y="228" fill="#22c55e" font-size="10" font-weight="600">receive</text>
  <line x1="405" y1="250" x2="405" y2="202" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="412" y="228" fill="#22c55e" font-size="10" font-weight="600">send</text>

  <!-- Charlie: receive at x=580, send at x=630 -->
  <line x1="580" y1="202" x2="580" y2="250" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="542" y="228" fill="#22c55e" font-size="10" font-weight="600">receive</text>
  <line x1="635" y1="250" x2="635" y2="202" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="642" y="228" fill="#22c55e" font-size="10" font-weight="600">send</text>

  <!-- Teammate boxes: y=250..320 (70px tall), 200px wide -->
  <!-- Alice -->
  <rect x="50" y="250" width="200" height="70" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="150" y="275" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Alice (Backend)</text>
  <text x="150" y="293" fill="#888888" font-size="11" text-anchor="middle">loop → inbox → work → reply</text>
  <text x="150" y="309" fill="#888888" font-size="10" text-anchor="middle">tools: bash, read, write, send</text>

  <!-- Bob -->
  <rect x="280" y="250" width="200" height="70" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="380" y="275" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Bob (Frontend)</text>
  <text x="380" y="293" fill="#888888" font-size="11" text-anchor="middle">loop → inbox → work → reply</text>
  <text x="380" y="309" fill="#888888" font-size="10" text-anchor="middle">tools: bash, read, write, send</text>

  <!-- Charlie -->
  <rect x="510" y="250" width="200" height="70" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="610" y="275" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Charlie (QA)</text>
  <text x="610" y="293" fill="#888888" font-size="11" text-anchor="middle">loop → inbox → work → reply</text>
  <text x="610" y="309" fill="#888888" font-size="10" text-anchor="middle">tools: bash, read, write, send</text>

  <!-- Junction dots -->
  <circle cx="340" cy="132" r="3" fill="#22c55e"/>
  <circle cx="420" cy="132" r="3" fill="#22c55e"/>
  <circle cx="130" cy="202" r="3" fill="#22c55e"/>
  <circle cx="165" cy="202" r="3" fill="#22c55e"/>
  <circle cx="355" cy="202" r="3" fill="#22c55e"/>
  <circle cx="405" cy="202" r="3" fill="#22c55e"/>
  <circle cx="580" cy="202" r="3" fill="#22c55e"/>
  <circle cx="635" cy="202" r="3" fill="#22c55e"/>
</svg>
