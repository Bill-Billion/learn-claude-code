<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 770 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="770" height="500" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="385" y="32" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">TodoWrite — One More Tool, Same Loop</text>
  <text x="385" y="50" fill="#888888" font-size="12" text-anchor="middle">Stateful task list added to the existing agent loop</text>

  <!-- ===== Row 1: messages[] -> LLM -> decision ===== -->

  <!-- messages[] -->
  <rect x="40" y="82" width="140" height="50" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="110" y="104" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle" font-family="monospace">messages[]</text>
  <text x="110" y="120" fill="#888888" font-size="10" text-anchor="middle">conversation history</text>

  <!-- Arrow: messages -> LLM -->
  <line x1="180" y1="107" x2="218" y2="107" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- LLM box -->
  <rect x="220" y="82" width="130" height="50" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="285" y="103" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">LLM</text>
  <text x="285" y="119" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">stop_reason?</text>

  <!-- Arrow: LLM -> diamond -->
  <line x1="350" y1="107" x2="428" y2="107" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Decision diamond -->
  <polygon points="430,107 470,82 510,107 470,132" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="470" y="111" fill="#1a1a1a" font-size="10" font-weight="600" text-anchor="middle">tool_use</text>

  <!-- Arrow: diamond down -> left -> Return Result (no) -->
  <path d="M470 132 L470 155 L184 155" fill="none" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="460" y="145" fill="#888888" font-size="10" font-weight="600" text-anchor="end">no</text>

  <!-- Return result box (pill shape) — far left, clear of other elements -->
  <rect x="60" y="140" width="124" height="30" rx="15" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="122" y="160" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">Return Result</text>

  <!-- Arrow: diamond right -> PreToolUse (yes) -->
  <line x1="510" y1="107" x2="518" y2="107" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="514" y="78" fill="#22c55e" font-size="10" font-weight="600" text-anchor="middle">yes</text>

  <!-- PreToolUse hooks -->
  <rect x="520" y="82" width="120" height="50" rx="8" fill="#fafafa" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="580" y="103" fill="#1a1a1a" font-size="11" font-weight="700" text-anchor="middle" font-family="monospace">trigger_hooks</text>
  <text x="580" y="119" fill="#888888" font-size="10" text-anchor="middle">PreToolUse</text>

  <!-- Arrow: PreToolUse -> TOOL_HANDLERS -->
  <line x1="580" y1="132" x2="580" y2="158" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ===== TOOL_HANDLERS container ===== -->
  <rect x="460" y="160" width="240" height="126" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="580" y="182" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle">TOOL_HANDLERS</text>

  <!-- Existing tools row -->
  <rect x="474" y="192" width="212" height="28" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="580" y="211" fill="#1a1a1a" font-size="11" text-anchor="middle" font-family="monospace">bash  read  write  edit  glob</text>

  <!-- New tool: todo_write (green border) -->
  <rect x="474" y="228" width="212" height="28" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="580" y="247" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle" font-family="monospace">todo_write</text>

  <!-- todo_write description -->
  <text x="580" y="274" fill="#888888" font-size="10" text-anchor="middle">in-process stateful TODO list</text>

  <!-- Arrow: TOOL_HANDLERS bottom -> PostToolUse -->
  <line x1="580" y1="286" x2="580" y2="310" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- PostToolUse hooks -->
  <rect x="520" y="310" width="120" height="36" rx="8" fill="#fafafa" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="580" y="333" fill="#888888" font-size="10" text-anchor="middle">PostToolUse</text>

  <!-- ===== Loop-back arrow (dashed green) ===== -->
  <!-- Path: PostToolUse bottom -> down -> right -> up -> left -> back to messages[] top -->
  <circle cx="580" cy="346" r="3" fill="#22c55e"/>
  <path d="M 580,346 L 580,380 L 730,380 L 730,64 L 110,64 L 110,82" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <circle cx="110" cy="82" r="3" fill="#22c55e"/>

  <!-- Loop-back label (below the bottom horizontal segment) -->
  <text x="385" y="396" fill="#888888" font-size="11" text-anchor="middle">Result appended to messages[], loop continues</text>

  <!-- ===== Nag Reminder Section ===== -->
  <rect x="40" y="416" width="690" height="64" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Terminal-style dark box -->
  <rect x="52" y="426" width="666" height="44" rx="4" fill="#2d2d2d"/>
  <text x="72" y="446" fill="#22c55e" font-size="12" font-weight="700" font-family="monospace">Nag Reminder</text>
  <text x="72" y="462" fill="#22c55e" font-size="11" font-family="monospace">if rounds_since_todo &gt;= 3: inject &lt;reminder&gt;Update your todos.&lt;/reminder&gt;</text>

</svg>