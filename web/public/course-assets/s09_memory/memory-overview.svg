<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="560" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="430" y="34" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Memory — Load, Extract &amp; Consolidate</text>
  <text x="430" y="54" fill="#888888" font-size="12" text-anchor="middle">Knowledge that survives compaction and sessions</text>

  <!-- ===== ROW 1: Main Pipeline (y center = 120) ===== -->

  <!-- messages[] box -->
  <rect x="30" y="88" width="120" height="60" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="90" y="114" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle" font-family="monospace">messages[]</text>
  <text x="90" y="132" fill="#888888" font-size="10" text-anchor="middle">conversation</text>

  <!-- Arrow: messages → Compression -->
  <line x1="150" y1="118" x2="178" y2="118" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Compression Pipeline box -->
  <rect x="182" y="84" width="156" height="68" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="260" y="108" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">Compression</text>
  <text x="260" y="124" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">budget → snip → micro</text>
  <text x="260" y="140" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">→ autoCompact</text>

  <!-- Arrow: Compression → Loading -->
  <line x1="338" y1="118" x2="366" y2="118" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Loading box (dashed = mutable) -->
  <rect x="370" y="84" width="148" height="68" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="444" y="108" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">Loading</text>
  <text x="444" y="124" fill="#888888" font-size="10" text-anchor="middle">LLM side-query selects</text>
  <text x="444" y="140" fill="#888888" font-size="10" text-anchor="middle">relevant files (max 5)</text>

  <!-- Arrow: Loading → LLM -->
  <line x1="518" y1="118" x2="550" y2="118" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- LLM decision diamond -->
  <polygon points="610,78 670,118 610,158 550,118" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="610" y="114" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle">LLM</text>
  <text x="610" y="128" fill="#888888" font-size="9" text-anchor="middle">tool_use?</text>

  <!-- Arrow: LLM → Yes → TOOL_HANDLERS -->
  <line x1="670" y1="118" x2="704" y2="118" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="684" y="110" fill="#22c55e" font-size="10" font-weight="600">yes</text>

  <!-- TOOL_HANDLERS box -->
  <rect x="708" y="88" width="130" height="60" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="773" y="112" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle">TOOL_HANDLERS</text>
  <text x="773" y="128" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">bash · read · write</text>
  <text x="773" y="142" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">edit · glob · task</text>

  <!-- Arrow: LLM → No → Return Result -->
  <line x1="610" y1="158" x2="610" y2="194" stroke="#888888" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="624" y="180" fill="#888888" font-size="10" font-weight="600">no</text>

  <!-- Return Result (terminal style) -->
  <rect x="540" y="198" width="140" height="34" rx="17" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="610" y="220" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">Return Result</text>

  <!-- ===== ROW 2: Memory Files (y center = 310) ===== -->

  <!-- Memory Files box (dashed = persistent/mutable) -->
  <rect x="180" y="282" width="460" height="60" rx="8" fill="#fafafa" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="410" y="306" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">.memory/</text>
  <text x="410" y="326" fill="#888888" font-size="11" text-anchor="middle" font-family="monospace">MEMORY.md index + *.md files (cross-session)</text>

  <!-- Arrow: Memory Files → Loading (read) -->
  <line x1="420" y1="282" x2="420" y2="156" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <circle cx="420" cy="282" r="3" fill="#22c55e"/>
  <text x="430" y="230" fill="#22c55e" font-size="10" font-weight="600">read</text>

  <!-- Arrow: Return Result → Memory Files (Extraction) -->
  <path d="M 610 232 L 610 260 Q 610 268 602 268 L 560 268 Q 552 268 552 276 L 552 278" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <circle cx="610" cy="232" r="3" fill="#22c55e"/>
  <text x="618" y="254" fill="#22c55e" font-size="10" font-weight="600">Extraction</text>
  <text x="618" y="267" fill="#888888" font-size="9">(after each turn)</text>

  <!-- Consolidation note (terminal style) -->
  <rect x="180" y="362" width="460" height="30" rx="4" fill="#2d2d2d"/>
  <text x="410" y="382" fill="#22c55e" font-size="11" text-anchor="middle" font-family="monospace">Consolidation: files &gt;= 10 → deduplicate · merge · prune</text>

  <!-- Arrow from memory to consolidation -->
  <line x1="410" y1="342" x2="410" y2="360" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- ===== Loop-back arrow (TOOL_HANDLERS → messages[]) ===== -->
  <path d="M 838 118 Q 846 118 846 126 L 846 420 Q 846 428 838 428 L 98 428 Q 90 428 90 420 L 90 148" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <circle cx="838" cy="118" r="3" fill="#22c55e"/>
  <circle cx="90" cy="148" r="3" fill="#22c55e"/>

  <!-- Loop label (terminal style) -->
  <rect x="210" y="436" width="440" height="28" rx="4" fill="#2d2d2d"/>
  <text x="430" y="454" fill="#22c55e" font-size="10" text-anchor="middle" font-family="monospace">tool result → messages[] → compress → load → LLM → extract</text>

  <!-- ===== Bottom: Memory Types Table ===== -->
  <rect x="40" y="486" width="780" height="60" rx="8" fill="#fafafa" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="60" y="508" fill="#1a1a1a" font-size="12" font-weight="700">Memory Types:</text>

  <!-- Row 1: user and feedback and project -->
  <text x="180" y="508" fill="#22c55e" font-size="11" font-weight="600" font-family="monospace">user</text>
  <text x="222" y="508" fill="#888888" font-size="10">who you are</text>

  <text x="360" y="508" fill="#22c55e" font-size="11" font-weight="600" font-family="monospace">feedback</text>
  <text x="430" y="508" fill="#888888" font-size="10">how to work</text>

  <text x="560" y="508" fill="#22c55e" font-size="11" font-weight="600" font-family="monospace">project</text>
  <text x="620" y="508" fill="#888888" font-size="10">what's happening</text>

  <!-- Row 2: reference and pipeline summary -->
  <text x="180" y="532" fill="#22c55e" font-size="11" font-weight="600" font-family="monospace">reference</text>
  <text x="256" y="532" fill="#888888" font-size="10">where to find things</text>

  <text x="560" y="532" fill="#888888" font-size="10">Pipeline: Loading → Extraction → Consolidation</text>

</svg>