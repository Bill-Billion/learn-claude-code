<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="560" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="410" y="30" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">MCP Plugin — Standard Protocol + External Tool Integration</text>
  <text x="410" y="48" fill="#888888" font-size="12" text-anchor="middle">Discover, assemble, invoke — agent doesn't need to know who wrote them</text>

  <!-- ===== Row 1: Agent Lead Loop ===== -->
  <rect x="20" y="68" width="780" height="102" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="410" y="86" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Agent Lead Loop</text>

  <!-- turn -->
  <rect x="40" y="100" width="60" height="40" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="70" y="124" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">turn</text>

  <!-- Arrow: turn → messages -->
  <line x1="100" y1="120" x2="120" y2="120" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- messages -->
  <rect x="128" y="100" width="80" height="40" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="168" y="124" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">messages</text>

  <!-- Arrow: messages → prompt -->
  <line x1="208" y1="120" x2="228" y2="120" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- prompt -->
  <rect x="236" y="100" width="70" height="40" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="271" y="124" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">prompt</text>

  <!-- Arrow: prompt → LLM -->
  <line x1="306" y1="120" x2="326" y2="120" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- LLM -->
  <rect x="334" y="100" width="56" height="40" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="362" y="124" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">LLM</text>

  <!-- Arrow: LLM → Tool Dispatch -->
  <line x1="390" y1="120" x2="410" y2="120" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Tool Dispatch -->
  <rect x="418" y="95" width="360" height="50" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="598" y="114" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">TOOL DISPATCH (18 tools)</text>
  <text x="598" y="132" fill="#888888" font-size="10" font-weight="400" text-anchor="middle" font-family="monospace">bash, read, write, task(5), connect_mcp, mcp__*</text>

  <!-- Loop-back arrow (dashed green) -->
  <path d="M 778 120 L 792 120 L 792 164 L 70 164 L 70 140" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="430" y="158" fill="#22c55e" font-size="10" font-weight="600">loop back</text>

  <!-- Junction dots -->
  <circle cx="778" cy="120" r="3" fill="#22c55e"/>
  <circle cx="70" cy="164" r="3" fill="#22c55e"/>

  <!-- ===== Row 2: MCP Architecture ===== -->
  <rect x="20" y="178" width="780" height="280" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="410" y="200" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">MCP Architecture — Standard Protocol + Dynamic External Tools</text>

  <!-- ===== Agent Side (MCPClient) ===== -->
  <rect x="40" y="216" width="310" height="192" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="195" y="238" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">Agent Side (MCPClient)</text>

  <!-- Step 1: connect_mcp -->
  <rect x="56" y="250" width="278" height="38" rx="4" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
  <text x="195" y="266" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">connect_mcp</text>
  <text x="195" y="280" fill="#888888" font-size="10" text-anchor="middle">Connect to server, discover tools, register</text>

  <!-- Step 2: assemble_tool_pool -->
  <rect x="56" y="296" width="278" height="38" rx="4" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
  <text x="195" y="312" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">assemble_tool_pool</text>
  <text x="195" y="326" fill="#888888" font-size="10" text-anchor="middle">Merge built-in + MCP tools into one pool</text>

  <!-- Step 3: call_tool -->
  <rect x="56" y="342" width="278" height="38" rx="4" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
  <text x="195" y="358" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">call_tool</text>
  <rect x="74" y="365" width="242" height="12" rx="2" fill="#2d2d2d"/>
  <text x="195" y="375" fill="#22c55e" font-size="9" font-weight="400" text-anchor="middle" font-family="monospace">call_tool("mcp__docs__search", ...)</text>

  <!-- ===== Communication Arrows ===== -->
  <!-- tools/list arrow (Agent → Server) -->
  <line x1="350" y1="268" x2="466" y2="268" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="404" y="260" fill="#22c55e" font-size="10" font-weight="600" text-anchor="middle">tools/list</text>

  <!-- tools/call arrow (Agent → Server) -->
  <line x1="350" y1="310" x2="466" y2="310" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="404" y="302" fill="#22c55e" font-size="10" font-weight="600" text-anchor="middle">tools/call</text>

  <!-- response arrow (Server → Agent) -->
  <line x1="466" y1="350" x2="350" y2="350" stroke="#888888" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="404" y="366" fill="#888888" font-size="10" font-weight="600" text-anchor="middle">response</text>

  <!-- Junction dots on arrows -->
  <circle cx="350" cy="268" r="3" fill="#22c55e"/>
  <circle cx="350" cy="310" r="3" fill="#22c55e"/>
  <circle cx="466" cy="350" r="3" fill="#888888"/>

  <!-- ===== MCP Servers ===== -->
  <rect x="468" y="216" width="316" height="192" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="626" y="238" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">MCP Servers (External Services)</text>

  <!-- Server 1: docs -->
  <rect x="484" y="250" width="284" height="38" rx="4" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
  <text x="626" y="266" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">docs server</text>
  <text x="626" y="280" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">search (readOnly) · get_version (readOnly)</text>

  <!-- Server 2: deploy -->
  <rect x="484" y="296" width="284" height="38" rx="4" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
  <text x="626" y="312" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">deploy server</text>
  <text x="626" y="326" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">trigger (destructive) · status (readOnly)</text>

  <!-- Server 3: Any language -->
  <rect x="484" y="342" width="284" height="38" rx="4" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
  <text x="626" y="358" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">any server ...</text>
  <text x="626" y="373" fill="#888888" font-size="10" text-anchor="middle">Any language, just implement stdio JSON-RPC</text>

  <!-- ===== Naming Convention Bar ===== -->
  <rect x="40" y="418" width="744" height="28" rx="4" fill="#2d2d2d"/>
  <text x="410" y="436" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle" font-family="monospace">Naming: mcp__{server}__{tool}  e.g. mcp__docs__search · mcp__deploy__trigger</text>

  <!-- ===== Row 3: Key Behaviors ===== -->
  <rect x="20" y="470" width="780" height="76" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="410" y="492" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Key Behaviors</text>

  <!-- Behavior 1 -->
  <rect x="40" y="502" width="240" height="32" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="160" y="518" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">No prompt cache</text>
  <text x="160" y="530" fill="#888888" font-size="9" text-anchor="middle">Tool pool is dynamic; cache stales</text>

  <!-- Behavior 2 -->
  <rect x="296" y="502" width="240" height="32" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="416" y="518" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">MCP tools = Lead only</text>
  <text x="416" y="530" fill="#888888" font-size="9" text-anchor="middle">Teammates use fixed 8-tool subset</text>

  <!-- Behavior 3 -->
  <rect x="552" y="502" width="232" height="32" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="668" y="518" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">normalize_mcp_name</text>
  <text x="668" y="530" fill="#888888" font-size="9" text-anchor="middle">Sanitize names: [a-zA-Z0-9_-]</text>
</svg>