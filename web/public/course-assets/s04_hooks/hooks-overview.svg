<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="450" y="34" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Hooks — Extension Logic Outside the Loop</text>
  <text x="450" y="54" fill="#888888" font-size="12" text-anchor="middle">PreToolUse / PostToolUse inject checks without modifying agent_loop</text>
  <line x1="40" y1="68" x2="860" y2="68" stroke="#d0d0d0" stroke-width="1"/>

  <!-- ===== ROW 1: messages[] → LLM ===== -->

  <!-- 1. messages[] box -->
  <rect x="40" y="100" width="140" height="60" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="110" y="126" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle" font-family="monospace">messages[]</text>
  <text x="110" y="146" fill="#888888" font-size="11" text-anchor="middle">conversation history</text>

  <!-- Arrow: messages → LLM -->
  <line x1="180" y1="130" x2="226" y2="130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- 2. LLM box -->
  <rect x="230" y="100" width="140" height="60" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="300" y="126" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">LLM</text>
  <text x="300" y="146" fill="#888888" font-size="11" text-anchor="middle" font-family="monospace">stop_reason?</text>

  <!-- LLM decision: end_turn → Return Result (downward) -->
  <line x1="300" y1="160" x2="300" y2="206" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="316" y="188" fill="#888888" font-size="10" font-weight="600">end_turn</text>
  <rect x="240" y="210" width="120" height="32" rx="16" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="300" y="231" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">Return Result</text>

  <!-- LLM decision: tool_use → PreToolUse (rightward) -->
  <line x1="370" y1="130" x2="426" y2="130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="388" y="120" fill="#22c55e" font-size="10" font-weight="600" text-anchor="middle">tool_use</text>

  <!-- ===== 3. PreToolUse hook (dashed green border) ===== -->
  <rect x="430" y="88" width="186" height="106" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="523" y="112" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">PreToolUse</text>
  <text x="523" y="130" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle" font-family="monospace">trigger_hooks()</text>
  <!-- Sub-container for hook names -->
  <rect x="444" y="140" width="158" height="22" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="523" y="155" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">permission · log</text>
  <text x="523" y="182" fill="#888888" font-size="10" text-anchor="middle">non-None = block exec</text>

  <!-- PreToolUse: blocked → tool_result (downward) -->
  <line x1="523" y1="194" x2="523" y2="226" stroke="#888888" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <rect x="457" y="230" width="132" height="30" rx="15" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="523" y="250" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">blocked → result</text>

  <!-- PreToolUse: pass → TOOL_HANDLERS (rightward) -->
  <line x1="616" y1="136" x2="672" y2="136" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="640" y="128" fill="#22c55e" font-size="10" font-weight="600">pass</text>

  <!-- ===== 4. TOOL_HANDLERS box ===== -->
  <rect x="676" y="106" width="140" height="64" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="746" y="130" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle" font-family="monospace">TOOL_HANDLERS</text>
  <text x="746" y="150" fill="#888888" font-size="10" text-anchor="middle">bash / read / write</text>

  <!-- TOOL_HANDLERS → PostToolUse (downward) -->
  <line x1="746" y1="170" x2="746" y2="286" stroke="#22c55e" stroke-width="2"/>
  <circle cx="746" cy="286" r="3" fill="#22c55e"/>
  <text x="760" y="232" fill="#22c55e" font-size="10" font-weight="600">after exec</text>

  <!-- ===== 5. PostToolUse hook (dashed green border) ===== -->
  <rect x="656" y="290" width="180" height="64" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="746" y="314" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">PostToolUse</text>
  <text x="746" y="332" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle" font-family="monospace">trigger_hooks()</text>
  <rect x="670" y="338" width="152" height="14" rx="3" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="746" y="349" fill="#888888" font-size="9" text-anchor="middle" font-family="monospace">large_output_hook</text>

  <!-- ===== Loop-back: PostToolUse → messages[] ===== -->
  <path d="M 836 322 L 860 322 L 860 400 L 110 400 L 110 160"
        fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>
  <circle cx="860" cy="322" r="3" fill="#22c55e"/>
  <circle cx="860" cy="400" r="3" fill="#22c55e"/>
  <circle cx="110" cy="400" r="3" fill="#22c55e"/>
  <text x="470" y="420" fill="#888888" font-size="11" text-anchor="middle">result appended to messages[], loop continues</text>

  <!-- ===== Bottom: Before vs After terminal mockup ===== -->
  <rect x="40" y="450" width="820" height="112" rx="4" fill="#2d2d2d"/>

  <!-- Terminal title bar dots -->
  <circle cx="60" cy="468" r="4" fill="#d0d0d0"/>
  <circle cx="74" cy="468" r="4" fill="#d0d0d0"/>
  <circle cx="88" cy="468" r="4" fill="#d0d0d0"/>
  <text x="450" y="472" fill="#888888" font-size="11" text-anchor="middle">Before vs After</text>

  <!-- Before: hardcoded -->
  <text x="60" y="500" fill="#888888" font-size="12" font-weight="600" font-family="monospace">Before:</text>
  <text x="150" y="500" fill="#888888" font-size="12" font-family="monospace">if not check_permission(block): ...</text>
  <text x="560" y="500" fill="#888888" font-size="11" font-family="monospace"># each check = modify loop</text>

  <!-- After: hooks -->
  <text x="60" y="534" fill="#22c55e" font-size="12" font-weight="600" font-family="monospace">After:</text>
  <text x="150" y="534" fill="#22c55e" font-size="12" font-family="monospace">blocked = trigger_hooks("PreToolUse", block)</text>
  <text x="560" y="534" fill="#22c55e" font-size="11" font-family="monospace"># add check = register_hook()</text>

</svg>