<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 740" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
    <marker id="arrow-magenta" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c026d3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="740" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="410" y="32" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Cron Scheduler</text>
  <text x="410" y="50" fill="#888888" font-size="12" text-anchor="middle">Scheduler produces · Queue Processor triggers · agent_loop consumes — via cron_queue</text>

  <!-- ===== Row 1: Agent Loop Chain ===== -->
  <rect x="20" y="70" width="780" height="130" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="40" y="90" fill="#1a1a1a" font-size="14" font-weight="700">Agent Loop</text>

  <!-- consume_cron_queue -->
  <rect x="40" y="104" width="108" height="48" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="94" y="124" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">consume</text>
  <text x="94" y="138" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">cron_queue</text>

  <line x1="148" y1="128" x2="173" y2="128" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="180" y="104" width="88" height="48" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="224" y="132" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">messages</text>

  <line x1="268" y1="128" x2="293" y2="128" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="300" y="100" width="128" height="56" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="364" y="124" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">prompt + cache</text>
  <text x="364" y="140" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">assemble_prompt()</text>

  <line x1="428" y1="128" x2="453" y2="128" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="460" y="100" width="108" height="56" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="514" y="124" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">LLM call</text>
  <text x="514" y="140" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">with_retry()</text>

  <line x1="568" y1="128" x2="593" y2="128" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="600" y="96" width="180" height="64" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="690" y="114" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">TOOL DISPATCH</text>
  <text x="616" y="128" fill="#888888" font-size="10" font-family="monospace">fast: bash, read, write</text>
  <text x="616" y="141" fill="#888888" font-size="10" font-family="monospace">slow: background thread</text>
  <text x="616" y="154" fill="#22c55e" font-size="10" font-family="monospace">cron: sched, list, cancel</text>

  <!-- Loop back arrow (dashed green) -->
  <path d="M 780 128 Q 796 128 796 144 L 796 180 Q 796 192 784 192 L 238 192 Q 224 192 224 180 L 224 152" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <circle cx="780" cy="128" r="3" fill="#22c55e"/>
  <text x="511" y="188" fill="#888888" font-size="11" text-anchor="middle">loop back: tool_results → next turn</text>

  <!-- ===== Trigger + Consume arrows up to Agent Loop ===== -->
  <!-- (4) consume: cron_queue -> consume_cron_queue (DATA flow, green solid) -->
  <circle cx="90" cy="240" r="3" fill="#22c55e"/>
  <path d="M 90 240 L 90 152" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <circle cx="22" cy="220" r="6" fill="#22c55e"/>
  <text x="22" y="223" fill="#ffffff" font-size="9" font-weight="700" text-anchor="middle">4</text>
  <text x="84" y="224" fill="#22c55e" font-size="10" font-weight="600" text-anchor="end">consume</text>

  <!-- (3) start turn: Queue Processor -> consume_cron_queue (CONTROL signal, magenta dashed) -->
  <circle cx="400" cy="240" r="3" fill="#c026d3"/>
  <path d="M 400 240 L 400 218 L 118 218 L 118 152" fill="none" stroke="#c026d3" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-magenta)"/>
  <circle cx="416" cy="228" r="6" fill="#c026d3"/>
  <text x="416" y="231" fill="#ffffff" font-size="9" font-weight="700" text-anchor="middle">3</text>
  <text x="427" y="232" fill="#c026d3" font-size="10" font-weight="600">start turn (trigger · no data)</text>

  <!-- Legend: data vs control -->
  <line x1="648" y1="210" x2="673" y2="210" stroke="#22c55e" stroke-width="2"/>
  <text x="679" y="214" fill="#888888" font-size="9">data flow (jobs · messages)</text>
  <line x1="648" y1="226" x2="673" y2="226" stroke="#c026d3" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="679" y="230" fill="#888888" font-size="9">control (trigger · no data)</text>

  <!-- ===== Flow row: cron_queue (center) -> Queue Processor (right) ===== -->
  <rect x="40" y="240" width="250" height="60" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="165" y="266" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">cron_queue</text>
  <text x="165" y="286" fill="#888888" font-size="10" text-anchor="middle">cron_lock protected</text>

  <!-- (2) cron_queue -> Queue Processor -->
  <line x1="290" y1="270" x2="354" y2="270" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <circle cx="296" cy="259" r="6" fill="#22c55e"/>
  <text x="296" y="262" fill="#ffffff" font-size="9" font-weight="700" text-anchor="middle">2</text>
  <text x="307" y="262" fill="#888888" font-size="10">non-empty?</text>

  <rect x="360" y="240" width="280" height="60" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="500" y="266" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">Queue Processor</text>
  <text x="500" y="286" fill="#888888" font-size="11" text-anchor="middle">polls 200ms · agent_lock</text>

  <!-- (1) Scheduler -> cron_queue (append) -->
  <circle cx="165" cy="330" r="3" fill="#22c55e"/>
  <path d="M 165 330 L 165 300" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <circle cx="178" cy="314" r="6" fill="#22c55e"/>
  <text x="178" y="317" fill="#ffffff" font-size="9" font-weight="700" text-anchor="middle">1</text>
  <text x="189" y="318" fill="#22c55e" font-size="10" font-weight="600">append</text>

  <!-- ===== Scheduler Thread (producer) ===== -->
  <rect x="40" y="330" width="370" height="160" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="56" y="354" fill="#1a1a1a" font-size="14" font-weight="700">Scheduler Thread (daemon)</text>
  <text x="56" y="372" fill="#888888" font-size="12">Polls every 1 second, independent of agent_loop</text>
  <rect x="56" y="386" width="338" height="92" rx="4" fill="#2d2d2d"/>
  <text x="68" y="404" fill="#22c55e" font-size="11" font-family="monospace">time.sleep(1)</text>
  <text x="68" y="420" fill="#22c55e" font-size="11" font-family="monospace">if cron_matches(job.cron, now):</text>
  <text x="68" y="436" fill="#22c55e" font-size="11" font-family="monospace">  cron_queue.append(job)</text>
  <text x="68" y="452" fill="#22c55e" font-size="10" font-family="monospace">  minute_marker prevents duplicate fire</text>
  <text x="68" y="468" fill="#22c55e" font-size="10" font-family="monospace">  one-shot jobs auto-removed after fire</text>

  <!-- ===== CronJob + Persistence (reference) ===== -->
  <rect x="430" y="330" width="370" height="160" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="446" y="354" fill="#1a1a1a" font-size="14" font-weight="700">CronJob + Persistence</text>
  <rect x="446" y="366" width="338" height="58" rx="4" fill="#2d2d2d"/>
  <text x="458" y="384" fill="#22c55e" font-size="11" font-family="monospace">CronJob(id, cron, prompt,</text>
  <text x="458" y="400" fill="#22c55e" font-size="11" font-family="monospace">        recurring, durable)</text>
  <text x="458" y="416" fill="#22c55e" font-size="10" font-family="monospace">@dataclass</text>
  <text x="446" y="444" fill="#1a1a1a" font-size="11" font-weight="600">Durable</text>
  <text x="510" y="444" fill="#888888" font-size="11">→ .scheduled_tasks.json (survives restart)</text>
  <text x="446" y="462" fill="#1a1a1a" font-size="11" font-weight="600">Session</text>
  <text x="510" y="462" fill="#888888" font-size="11">→ in-memory only (lost on exit)</text>
  <text x="446" y="482" fill="#888888" font-size="10">Process exit = scheduler stops (not OS crontab)</text>

  <!-- ===== 5-field Cron Expression Reference ===== -->
  <rect x="20" y="510" width="780" height="220" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="40" y="536" fill="#1a1a1a" font-size="14" font-weight="700">5-Field Cron Expression</text>

  <rect x="40" y="550" width="70" height="28" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="75" y="569" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle" font-family="monospace">*</text>
  <text x="75" y="596" fill="#888888" font-size="11" text-anchor="middle">minute</text>

  <rect x="130" y="550" width="70" height="28" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="165" y="569" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle" font-family="monospace">*</text>
  <text x="165" y="596" fill="#888888" font-size="11" text-anchor="middle">hour</text>

  <rect x="220" y="550" width="70" height="28" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="255" y="569" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle" font-family="monospace">*</text>
  <text x="255" y="596" fill="#888888" font-size="11" text-anchor="middle">day</text>

  <rect x="310" y="550" width="70" height="28" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="345" y="569" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle" font-family="monospace">*</text>
  <text x="345" y="596" fill="#888888" font-size="11" text-anchor="middle">month</text>

  <rect x="400" y="550" width="70" height="28" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="435" y="569" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle" font-family="monospace">*</text>
  <text x="435" y="596" fill="#888888" font-size="11" text-anchor="middle">weekday</text>

  <rect x="40" y="616" width="740" height="96" rx="4" fill="#2d2d2d"/>
  <text x="56" y="636" fill="#22c55e" font-size="12" font-family="monospace">*/5 *   *   *   *     Every 5 minutes</text>
  <text x="56" y="656" fill="#22c55e" font-size="12" font-family="monospace">0   9   *   *   *     Every day at 9:00</text>
  <text x="56" y="676" fill="#22c55e" font-size="12" font-family="monospace">0   9   *   *   1-5   Weekdays at 9:00</text>
  <text x="56" y="696" fill="#22c55e" font-size="12" font-family="monospace">Supports: *, */N, N, N-M, N,M,...</text>
</svg>
