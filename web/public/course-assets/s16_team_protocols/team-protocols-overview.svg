<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="620" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="410" y="30" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Team Protocols Overview</text>
  <text x="410" y="48" fill="#888888" font-size="12" text-anchor="middle">Request-Response Protocol + request_id Correlation + State Machine</text>

  <!-- ===== SECTION 1: Lead Agent Loop ===== -->
  <rect x="20" y="68" width="780" height="90" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="40" y="88" fill="#1a1a1a" font-size="14" font-weight="700">Lead Agent Loop</text>

  <!-- turn box -->
  <rect x="40" y="100" width="70" height="36" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="75" y="123" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">turn</text>

  <!-- arrow turn → messages -->
  <line x1="110" y1="118" x2="140" y2="118" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- messages box -->
  <rect x="148" y="100" width="90" height="36" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="193" y="123" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">messages</text>

  <!-- arrow messages → prompt -->
  <line x1="238" y1="118" x2="268" y2="118" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- prompt box -->
  <rect x="276" y="100" width="80" height="36" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="316" y="123" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">prompt</text>

  <!-- arrow prompt → LLM -->
  <line x1="356" y1="118" x2="386" y2="118" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- LLM box -->
  <rect x="394" y="100" width="60" height="36" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="424" y="123" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle">LLM</text>

  <!-- arrow LLM → Tool Dispatch -->
  <line x1="454" y1="118" x2="484" y2="118" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Tool Dispatch box -->
  <rect x="492" y="96" width="290" height="44" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="637" y="113" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle">TOOL DISPATCH</text>
  <text x="637" y="130" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">bash read write task spawn send inbox ...</text>

  <!-- Loop-back dashed arrow -->
  <path d="M 782 118 L 796 118 L 796 150 L 75 150 L 75 136" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="430" y="146" fill="#888888" font-size="10" text-anchor="middle">loop back</text>

  <!-- ===== SECTION 2: Protocol Flow ===== -->
  <rect x="20" y="176" width="780" height="168" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="410" y="198" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Request-Response Protocol Flow (linked by request_id)</text>

  <!-- Step 1: Lead sends request -->
  <rect x="40" y="214" width="165" height="76" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="122" y="232" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">1. Lead Sends Request</text>
  <rect x="50" y="240" width="145" height="40" rx="4" fill="#2d2d2d"/>
  <text x="60" y="256" fill="#22c55e" font-size="10" font-family="monospace">BUS.send(</text>
  <text x="60" y="272" fill="#22c55e" font-size="10" font-family="monospace"> "shutdown_request")</text>

  <!-- Arrow 1 → 2 -->
  <line x1="205" y1="252" x2="234" y2="252" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Step 2: Teammate receives -->
  <rect x="242" y="214" width="165" height="76" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="324" y="232" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">2. Teammate Receives</text>
  <rect x="252" y="240" width="145" height="40" rx="4" fill="#2d2d2d"/>
  <text x="262" y="256" fill="#22c55e" font-size="10" font-family="monospace">dispatch_message()</text>
  <text x="262" y="272" fill="#22c55e" font-size="10" font-family="monospace">  → handler(type)</text>

  <!-- Arrow 2 → 3 -->
  <line x1="407" y1="252" x2="436" y2="252" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Step 3: Teammate replies -->
  <rect x="444" y="214" width="165" height="76" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="526" y="232" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">3. Teammate Replies</text>
  <rect x="454" y="240" width="145" height="40" rx="4" fill="#2d2d2d"/>
  <text x="464" y="256" fill="#22c55e" font-size="10" font-family="monospace">BUS.send(</text>
  <text x="464" y="272" fill="#22c55e" font-size="10" font-family="monospace"> "shutdown_response")</text>

  <!-- Arrow 3 → 4 -->
  <line x1="609" y1="252" x2="638" y2="252" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Step 4: Lead receives response -->
  <rect x="646" y="214" width="138" height="76" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="715" y="232" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">4. Lead Matches</text>
  <rect x="656" y="240" width="118" height="40" rx="4" fill="#2d2d2d"/>
  <text x="666" y="256" fill="#22c55e" font-size="10" font-family="monospace">match_response(</text>
  <text x="666" y="272" fill="#22c55e" font-size="10" font-family="monospace"> request_id)</text>

  <!-- request_id label spanning the flow -->
  <line x1="122" y1="306" x2="715" y2="306" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,2"/>
  <circle cx="122" cy="306" r="3" fill="#22c55e"/>
  <circle cx="715" cy="306" r="3" fill="#22c55e"/>
  <rect x="340" y="298" width="140" height="16" rx="3" fill="#ffffff"/>
  <text x="410" y="310" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle" font-family="monospace">request_id links all</text>

  <!-- ===== SECTION 3: State Machine ===== -->
  <rect x="20" y="358" width="380" height="130" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="210" y="382" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">State Machine</text>
  <text x="210" y="396" fill="#888888" font-size="11" text-anchor="middle">Same FSM for both protocol types</text>

  <!-- pending state -->
  <rect x="60" y="416" width="80" height="32" rx="8" fill="#fafafa" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="100" y="437" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">pending</text>

  <!-- Arrow pending → approved -->
  <line x1="140" y1="424" x2="208" y2="424" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="174" y="418" fill="#22c55e" font-size="10" font-weight="600" text-anchor="middle">approve</text>

  <!-- approved state -->
  <rect x="216" y="408" width="84" height="32" rx="16" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="258" y="429" fill="#888888" font-size="12" font-weight="600" text-anchor="middle">approved</text>

  <!-- Arrow pending → rejected -->
  <path d="M 100 448 L 100 470 L 208 470" fill="none" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="146" y="466" fill="#888888" font-size="10" font-weight="600" text-anchor="middle">reject</text>

  <!-- rejected state -->
  <rect x="216" y="454" width="84" height="32" rx="16" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="258" y="475" fill="#888888" font-size="12" font-weight="600" text-anchor="middle">rejected</text>

  <!-- ===== SECTION 3b: pending_requests Storage ===== -->
  <rect x="420" y="358" width="380" height="130" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="610" y="382" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">pending_requests Storage</text>

  <rect x="440" y="400" width="340" height="72" rx="4" fill="#2d2d2d"/>
  <text x="455" y="420" fill="#22c55e" font-size="11" font-family="monospace">pending_requests:</text>
  <text x="455" y="436" fill="#22c55e" font-size="11" font-family="monospace">  dict[str, ProtocolState]</text>
  <text x="455" y="456" fill="#22c55e" font-size="10" font-family="monospace">request_id → {type, sender,</text>
  <text x="455" y="468" fill="#22c55e" font-size="10" font-family="monospace">  status, created_at}</text>

  <!-- ===== SECTION 4: Two Protocols ===== -->
  <rect x="20" y="506" width="780" height="96" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="410" y="530" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Two Protocols, One Mechanism</text>

  <!-- shutdown_request box -->
  <rect x="80" y="544" width="280" height="44" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="220" y="563" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle" font-family="monospace">shutdown_request / response</text>
  <text x="220" y="579" fill="#888888" font-size="11" text-anchor="middle">Lead → Teammate (graceful shutdown)</text>

  <!-- plan_approval_request box -->
  <rect x="460" y="544" width="300" height="44" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="610" y="563" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle" font-family="monospace">plan_approval_request / response</text>
  <text x="610" y="579" fill="#888888" font-size="11" text-anchor="middle">Teammate → Lead (plan review)</text>

  <!-- Shared arrow pointing up to state machine -->
  <line x1="220" y1="544" x2="220" y2="488" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <path d="M 610 544 L 610 498 L 340 498 L 340 488" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <circle cx="610" cy="498" r="3" fill="#22c55e"/>
  <circle cx="340" cy="498" r="3" fill="#22c55e"/>
  <text x="280" y="500" fill="#22c55e" font-size="10" font-weight="600" text-anchor="middle">shared FSM</text>
</svg>