<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="520" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="410" y="30" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Worktree Isolation</text>
  <text x="410" y="48" fill="#888888" font-size="12" text-anchor="middle">Git Worktree + Task-Directory Binding + Event Log</text>

  <!-- ===== ROW 1: Lead Loop ===== -->
  <!-- turn -->
  <rect x="30" y="76" width="68" height="36" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="64" y="99" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle">turn</text>

  <!-- Arrow: turn → messages -->
  <line x1="98" y1="94" x2="118" y2="94" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- messages -->
  <rect x="126" y="76" width="86" height="36" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="169" y="99" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle">messages</text>

  <!-- Arrow: messages → prompt -->
  <line x1="212" y1="94" x2="232" y2="94" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- prompt -->
  <rect x="240" y="76" width="76" height="36" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="278" y="99" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle">prompt</text>

  <!-- Arrow: prompt → LLM -->
  <line x1="316" y1="94" x2="336" y2="94" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- LLM -->
  <rect x="344" y="76" width="60" height="36" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="374" y="99" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle">LLM</text>

  <!-- Arrow: LLM → Tool Dispatch -->
  <line x1="404" y1="94" x2="424" y2="94" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Tool Dispatch Box -->
  <rect x="432" y="68" width="360" height="76" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="612" y="88" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">TOOL DISPATCH</text>
  <text x="448" y="104" fill="#888888" font-size="11" font-family="monospace">bash  read  write  task(4)  send  inbox</text>
  <text x="448" y="118" fill="#888888" font-size="11" font-family="monospace">request_shutdown  request_plan  review_plan</text>
  <text x="448" y="132" fill="#22c55e" font-size="11" font-weight="600" font-family="monospace">create_worktree  remove_worktree  keep_worktree</text>

  <!-- Loop-back arrow (dashed green) -->
  <path d="M 792 94 L 806 94 L 806 150 L 64 150 L 64 112" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <text x="420" y="163" fill="#888888" font-size="11" text-anchor="middle">loop back</text>

  <!-- ===== ROW 2: Worktree Isolation Topology ===== -->
  <rect x="30" y="182" width="760" height="252" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="410" y="204" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Worktree Isolation: Each Task Gets Its Own Directory + Branch</text>

  <!-- Main Repo Box -->
  <rect x="230" y="218" width="360" height="38" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="410" y="237" fill="#1a1a1a" font-size="12" font-weight="600" font-family="monospace" text-anchor="middle">Main Repo  (.tasks/ .worktrees/ .mailboxes/)</text>
  <text x="410" y="251" fill="#888888" font-size="10" text-anchor="middle">shared state, task metadata, message bus</text>

  <!-- Junction dots on main repo bottom -->
  <circle cx="320" cy="256" r="3" fill="#22c55e"/>
  <circle cx="500" cy="256" r="3" fill="#22c55e"/>

  <!-- Arrow: Main repo → Alice worktree -->
  <path d="M 320 256 L 320 268 L 195 268 L 195 286" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="210" y="280" fill="#22c55e" font-size="10" font-weight="600">create + bind</text>

  <!-- Arrow: Main repo → Bob worktree -->
  <path d="M 500 256 L 500 268 L 625 268 L 625 286" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="540" y="280" fill="#22c55e" font-size="10" font-weight="600">create + bind</text>

  <!-- Alice Worktree Box -->
  <rect x="52" y="294" width="286" height="86" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="195" y="314" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">Alice: .worktrees/auth/</text>
  <text x="68" y="332" fill="#888888" font-size="11" font-family="monospace">branch: wt/auth-refactor</text>
  <text x="68" y="348" fill="#888888" font-size="11">Task: Refactor auth module</text>
  <text x="68" y="368" fill="#22c55e" font-size="11" font-weight="600">Isolated from Bob and main repo</text>

  <!-- Bob Worktree Box -->
  <rect x="482" y="294" width="286" height="86" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="625" y="314" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">Bob: .worktrees/ui/</text>
  <text x="498" y="332" fill="#888888" font-size="11" font-family="monospace">branch: wt/ui-login</text>
  <text x="498" y="348" fill="#888888" font-size="11">Task: Refactor UI login page</text>
  <text x="498" y="368" fill="#22c55e" font-size="11" font-weight="600">Isolated from Alice and main repo</text>

  <!-- Event Log Box (dashed border for mutable data) -->
  <rect x="52" y="396" width="360" height="28" rx="4" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="232" y="415" fill="#888888" font-size="11" text-anchor="middle">Event Log: .worktrees/events.jsonl (create / remove / keep)</text>

  <!-- Lifecycle Box -->
  <rect x="418" y="396" width="370" height="28" rx="4" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="603" y="415" fill="#888888" font-size="11" text-anchor="middle">Cleanup: keep (preserve for review) / remove (delete + done)</text>

  <!-- ===== ROW 3: Terminal mockup showing key commands ===== -->
  <rect x="30" y="450" width="760" height="56" rx="4" fill="#2d2d2d"/>
  <text x="46" y="470" fill="#22c55e" font-size="12" font-family="monospace">$ create_worktree("auth", task_id="t1")  # Creates .worktrees/auth/ + branch wt/auth</text>
  <text x="46" y="488" fill="#22c55e" font-size="12" font-family="monospace">$ keep_worktree("auth")                  # Preserve branch for review</text>
  <!-- Cursor block -->
  <rect x="46" y="494" width="8" height="3" rx="1" fill="#22c55e"/>
</svg>