<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 548" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="548" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="440" y="28" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Subagent — Independent messages[], Intermediate Steps Discarded</text>
  <line x1="40" y1="42" x2="840" y2="42" stroke="#d0d0d0" stroke-width="1"/>

  <!-- ===== Parent Agent (left) ===== -->
  <rect x="30" y="60" width="350" height="316" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="205" y="84" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Parent Agent</text>

  <!-- messages[] (dashed — mutable) -->
  <rect x="50" y="100" width="130" height="36" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="115" y="123" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle" font-family="monospace">messages[]</text>

  <!-- Arrow: messages[] -> LLM -->
  <line x1="180" y1="118" x2="220" y2="118" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- LLM box -->
  <rect x="222" y="98" width="110" height="40" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="277" y="123" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">LLM</text>

  <!-- Arrow: LLM -> TOOL_HANDLERS -->
  <line x1="277" y1="138" x2="277" y2="162" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="292" y="155" fill="#888888" font-size="10" font-weight="600" font-family="monospace">tool_use</text>

  <!-- TOOL_HANDLERS container -->
  <rect x="50" y="164" width="310" height="86" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="205" y="182" fill="#1a1a1a" font-size="11" font-weight="700" text-anchor="middle">TOOL_HANDLERS</text>

  <!-- Base tools box -->
  <rect x="65" y="192" width="134" height="44" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="132" y="209" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">Base Tools</text>
  <text x="132" y="226" fill="#888888" font-size="9" text-anchor="middle" font-family="monospace">bash/read/write/...</text>

  <!-- task -> spawn box (green border) -->
  <rect x="214" y="192" width="130" height="44" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="279" y="209" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle" font-family="monospace">task</text>
  <text x="279" y="226" fill="#888888" font-size="9" text-anchor="middle">spawn_subagent()</text>

  <!-- tool_result box -->
  <rect x="172" y="296" width="140" height="32" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="242" y="317" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle" font-family="monospace">tool_result</text>

  <!-- Arrow: TOOL_HANDLERS -> tool_result -->
  <line x1="242" y1="250" x2="242" y2="294" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Loop-back arrow: tool_result -> messages[] (dashed green) -->
  <path d="M 172 312 L 42 312 L 42 118 L 50 118" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>
  <text x="98" y="332" fill="#888888" font-size="10" text-anchor="middle">append to <tspan font-family="monospace">messages[]</tspan></text>

  <!-- ===== Subagent (right) ===== -->
  <rect x="470" y="60" width="380" height="316" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="660" y="84" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Subagent (Fresh Context)</text>

  <!-- fresh messages box (dashed) -->
  <rect x="490" y="100" width="170" height="40" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="575" y="117" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle" font-family="monospace">messages = [task]</text>
  <text x="575" y="132" fill="#888888" font-size="9" text-anchor="middle">fresh — no parent history</text>

  <!-- Arrow: messages -> LLM -->
  <line x1="660" y1="120" x2="700" y2="120" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Subagent LLM box -->
  <rect x="702" y="98" width="110" height="44" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="757" y="125" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">LLM</text>

  <!-- Own loop container (dashed border) -->
  <rect x="490" y="156" width="340" height="58" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="660" y="176" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">Own while loop (max 30 rounds)</text>
  <text x="660" y="192" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">bash / read / write / edit / glob</text>
  <text x="660" y="206" fill="#888888" font-size="9" text-anchor="middle">No task tool — no recursive spawn</text>

  <!-- Intermediate results -> discarded (terminal style dark box) -->
  <rect x="490" y="226" width="340" height="46" rx="4" fill="#2d2d2d"/>
  <text x="660" y="246" fill="#888888" font-size="11" text-anchor="middle" font-family="monospace">30+ intermediate tool calls</text>
  <text x="660" y="262" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle" font-family="monospace">ALL DISCARDED</text>

  <!-- Extract only last text (green accent) -->
  <rect x="490" y="284" width="340" height="32" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="660" y="305" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle">extract_text() — only final conclusion returned</text>

  <!-- ===== Dispatch line: Parent -> Subagent (task description) ===== -->
  <path d="M 344 214 L 400 214 Q 408 214 408 206 L 408 128 Q 408 120 416 120 L 490 120" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- Junction dot -->
  <circle cx="344" cy="214" r="3" fill="#22c55e"/>
  <!-- Label box -->
  <rect x="388" y="150" width="80" height="22" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="428" y="165" fill="#22c55e" font-size="10" font-weight="700" text-anchor="middle" font-family="monospace">1  task desc</text>

  <!-- ===== Return line: Subagent -> Parent tool_result ===== -->
  <path d="M 490 300 L 312 300" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- Junction dot -->
  <circle cx="490" cy="300" r="3" fill="#22c55e"/>
  <!-- Label box -->
  <rect x="388" y="282" width="80" height="22" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="428" y="297" fill="#22c55e" font-size="10" font-weight="700" text-anchor="middle" font-family="monospace">2  summary</text>

  <!-- ===== Bottom: Data Flow Summary ===== -->
  <line x1="40" y1="392" x2="840" y2="392" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Data flow box (terminal style) -->
  <rect x="40" y="406" width="800" height="52" rx="4" fill="#2d2d2d"/>
  <text x="60" y="428" fill="#22c55e" font-size="12" font-weight="700" font-family="monospace">1  Parent -> Subagent</text>
  <text x="310" y="428" fill="#888888" font-size="12" font-family="monospace">task description (short text prompt)</text>
  <text x="60" y="448" fill="#22c55e" font-size="12" font-weight="700" font-family="monospace">2  Subagent -> Parent</text>
  <text x="310" y="448" fill="#888888" font-size="12" font-family="monospace">extract_text() (final conclusion only)</text>

  <!-- Key design decisions table -->
  <rect x="40" y="472" width="800" height="66" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="440" y="490" fill="#1a1a1a" font-size="11" font-weight="700" text-anchor="middle">Key Design Decisions</text>

  <!-- Row 1 -->
  <text x="60" y="510" fill="#22c55e" font-size="10" font-weight="600" font-family="monospace">Context isolation</text>
  <text x="205" y="510" fill="#888888" font-size="10">Fresh messages[] per subagent</text>

  <!-- Row 2 -->
  <text x="395" y="510" fill="#22c55e" font-size="10" font-weight="600" font-family="monospace">Return conclusion</text>
  <text x="535" y="510" fill="#888888" font-size="10">extract_text(last_msg)</text>

  <!-- Row 3 -->
  <text x="60" y="528" fill="#22c55e" font-size="10" font-weight="600" font-family="monospace">No recursion</text>
  <text x="175" y="528" fill="#888888" font-size="10">No task tool in subagent</text>

  <!-- Row 4 -->
  <text x="395" y="528" fill="#22c55e" font-size="10" font-weight="600" font-family="monospace">Security enforced</text>
  <text x="540" y="528" fill="#888888" font-size="10">PreToolUse hooks still apply</text>

  <!-- Separator dots between decision columns -->
  <circle cx="380" cy="507" r="2" fill="#d0d0d0"/>
  <circle cx="380" cy="525" r="2" fill="#d0d0d0"/>
</svg>