<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 648" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="648" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="430" y="32" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Task System Overview</text>
  <text x="430" y="50" fill="#888888" font-size="12" text-anchor="middle">5 Task Tools + .tasks/ Persistence + blockedBy Dependencies</text>

  <!-- ===== Agent Loop (top row) ===== -->
  <rect x="30" y="68" width="800" height="96" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="50" y="88" fill="#1a1a1a" font-size="14" font-weight="700">Agent Loop</text>

  <!-- messages box -->
  <rect x="50" y="100" width="96" height="42" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="98" y="125" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">messages</text>

  <line x1="146" y1="121" x2="174" y2="121" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- prompt + compress box -->
  <rect x="180" y="100" width="140" height="42" rx="8" fill="#fafafa" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="250" y="118" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">prompt +</text>
  <text x="250" y="133" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">compress</text>

  <line x1="320" y1="121" x2="348" y2="121" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- LLM box -->
  <rect x="354" y="100" width="100" height="42" rx="8" fill="#fafafa" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="404" y="118" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">LLM</text>
  <text x="404" y="133" fill="#888888" font-size="10" text-anchor="middle">(try/except)</text>

  <line x1="454" y1="121" x2="482" y2="121" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- TOOL_HANDLERS box -->
  <rect x="488" y="95" width="320" height="52" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="648" y="115" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">TOOL_HANDLERS</text>
  <text x="648" y="131" fill="#888888" font-size="11" text-anchor="middle" font-family="monospace">bash  read  write  + 5 task tools</text>

  <!-- Loop-back arrow (dashed green) -->
  <path d="M 648 147 L 648 156 L 98 156 L 98 142" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <circle cx="648" cy="147" r="3" fill="#22c55e"/>
  <circle cx="98" cy="142" r="3" fill="#22c55e"/>

  <!-- ===== Dispatch round-trip: TOOL_HANDLERS <-> 5 Task Tools ===== -->
  <!-- (1) dispatch DOWN -->
  <circle cx="600" cy="164" r="3" fill="#22c55e"/>
  <path d="M 600 164 L 600 210" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="592" y="186" fill="#22c55e" font-size="10" font-weight="600" text-anchor="end">on tool_use</text>
  <text x="592" y="199" fill="#22c55e" font-size="10" font-weight="600" text-anchor="end">→ dispatch a task tool</text>
  <!-- (2) result UP -->
  <circle cx="700" cy="210" r="3" fill="#22c55e"/>
  <path d="M 700 210 L 700 164" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="710" y="192" fill="#22c55e" font-size="10" font-weight="600" text-anchor="start">result → tool_result</text>

  <!-- ===== .tasks/ Directory (LEFT, dashed border = mutable) ===== -->
  <rect x="30" y="210" width="380" height="126" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="220" y="234" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">.tasks/ — Cross-Session Persistence</text>
  <text x="46" y="256" fill="#1a1a1a" font-size="11" font-family="monospace">task_xxx.json  task_yyy.json  task_zzz.json</text>
  <text x="46" y="276" fill="#888888" font-size="11">{id, subject, description, status, owner, blockedBy}</text>
  <text x="46" y="296" fill="#888888" font-size="11">ID: timestamp + random_hex (teaching version)</text>
  <text x="46" y="314" fill="#888888" font-size="11">ID: sequential + highwatermark (production)</text>

  <!-- ===== 5 Task Tools (RIGHT, terminal mockup) — directly under TOOL_HANDLERS ===== -->
  <rect x="450" y="210" width="380" height="126" rx="4" fill="#2d2d2d"/>
  <text x="466" y="232" fill="#22c55e" font-size="11" font-weight="700" font-family="monospace">5 Task Tools</text>
  <text x="466" y="250" fill="#22c55e" font-size="11" font-family="monospace">create_task(subject, desc, blockedBy)</text>
  <text x="466" y="266" fill="#22c55e" font-size="11" font-family="monospace">list_tasks()        → summary table</text>
  <text x="466" y="282" fill="#22c55e" font-size="11" font-family="monospace">get_task(id)        → full JSON</text>
  <text x="466" y="298" fill="#22c55e" font-size="11" font-family="monospace">claim_task(id)      → set owner</text>
  <text x="466" y="314" fill="#22c55e" font-size="11" font-family="monospace">complete_task(id)   → unblock deps</text>

  <!-- R/W between 5 Task Tools and .tasks/ (bidirectional) -->
  <line x1="446" y1="273" x2="414" y2="273" stroke="#22c55e" stroke-width="2" marker-start="url(#arrow-green)" marker-end="url(#arrow-green)"/>
  <text x="430" y="265" fill="#22c55e" font-size="10" font-weight="600" text-anchor="middle">R/W</text>

  <!-- ===== Dependency Check + Lifecycle ===== -->
  <rect x="30" y="358" width="800" height="108" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="50" y="380" fill="#1a1a1a" font-size="14" font-weight="700">Dependency Check + Lifecycle</text>

  <rect x="50" y="392" width="230" height="58" rx="4" fill="#2d2d2d"/>
  <text x="62" y="410" fill="#22c55e" font-size="11" font-family="monospace" font-weight="600">can_start(task_id):</text>
  <text x="62" y="426" fill="#22c55e" font-size="11" font-family="monospace">  all blockedBy completed?</text>
  <text x="62" y="442" fill="#22c55e" font-size="11" font-family="monospace">  missing dep → blocked</text>

  <rect x="300" y="392" width="240" height="58" rx="4" fill="#2d2d2d"/>
  <text x="312" y="410" fill="#22c55e" font-size="11" font-family="monospace" font-weight="600">claim_task:</text>
  <text x="312" y="426" fill="#22c55e" font-size="11" font-family="monospace">  owner = agent_name</text>
  <text x="312" y="442" fill="#22c55e" font-size="11" font-family="monospace">  pending → in_progress</text>

  <rect x="560" y="392" width="250" height="58" rx="4" fill="#2d2d2d"/>
  <text x="572" y="410" fill="#22c55e" font-size="11" font-family="monospace" font-weight="600">complete_task:</text>
  <text x="572" y="426" fill="#22c55e" font-size="11" font-family="monospace">  status → completed</text>
  <text x="572" y="442" fill="#22c55e" font-size="11" font-family="monospace">  scan + unblock downstream</text>

  <!-- ===== State Machine ===== -->
  <rect x="30" y="488" width="800" height="66" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="50" y="514" fill="#1a1a1a" font-size="14" font-weight="700">State Machine</text>

  <rect x="190" y="501" width="100" height="32" rx="6" fill="#fafafa" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="240" y="522" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">pending</text>

  <line x1="290" y1="517" x2="380" y2="517" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="335" y="510" fill="#22c55e" font-size="10" font-weight="600" text-anchor="middle">claim</text>

  <rect x="386" y="501" width="120" height="32" rx="6" fill="#fafafa" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="446" y="522" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">in_progress</text>

  <line x1="506" y1="517" x2="592" y2="517" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="549" y="510" fill="#22c55e" font-size="10" font-weight="600" text-anchor="middle">complete</text>

  <rect x="598" y="501" width="116" height="32" rx="16" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="656" y="522" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle">completed</text>

  <text x="430" y="548" fill="#888888" font-size="10" text-anchor="middle">No release rollback. On crash: unassign owner, reset to pending for re-claim.</text>

  <!-- ===== Comparison: TodoWrite vs Task System ===== -->
  <rect x="30" y="574" width="800" height="66" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="50" y="596" fill="#1a1a1a" font-size="12" font-weight="700">TodoWrite vs Task System</text>

  <text x="260" y="596" fill="#888888" font-size="11" font-weight="600">TodoWrite</text>
  <text x="560" y="596" fill="#22c55e" font-size="11" font-weight="600">Task System</text>

  <text x="50" y="614" fill="#888888" font-size="11">Storage</text>
  <text x="260" y="614" fill="#888888" font-size="11">In-session memory</text>
  <text x="560" y="614" fill="#1a1a1a" font-size="11">.tasks/{id}.json cross-session</text>

  <text x="50" y="630" fill="#888888" font-size="11">Dependencies</text>
  <text x="260" y="630" fill="#888888" font-size="11">None</text>
  <text x="560" y="630" fill="#1a1a1a" font-size="11">blockedBy graph + can_start check</text>
</svg>
