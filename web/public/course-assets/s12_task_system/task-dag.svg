<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="480" fill="#ffffff" rx="8" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Title -->
  <text x="360" y="34" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Task DAG</text>
  <text x="360" y="54" fill="#888888" font-size="12" text-anchor="middle">Dependency Example: schema &#x2192; endpoints / docs &#x2192; tests &#x2192; deploy</text>

  <!-- ================================================ -->
  <!-- Row 1: schema (completed) -->
  <!-- ================================================ -->
  <rect x="270" y="78" width="180" height="58" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="360" y="106" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">schema</text>
  <text x="360" y="124" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle">completed</text>

  <!-- ================================================ -->
  <!-- Arrows: schema -> endpoints, schema -> docs -->
  <!-- ================================================ -->
  <!-- Junction points at bottom of schema box -->
  <circle cx="315" cy="136" r="3" fill="#22c55e"/>
  <circle cx="405" cy="136" r="3" fill="#22c55e"/>

  <!-- schema -> endpoints (left branch) -->
  <path d="M 315 139 L 220 194" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- schema -> docs (right branch) -->
  <path d="M 405 139 L 500 194" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ================================================ -->
  <!-- Row 2: endpoints (in_progress), docs (pending) -->
  <!-- ================================================ -->

  <!-- endpoints -->
  <rect x="110" y="194" width="220" height="62" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="220" y="222" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">endpoints</text>
  <text x="220" y="240" fill="#888888" font-size="11" text-anchor="middle">in_progress | owner: agent-1</text>

  <!-- docs -->
  <rect x="390" y="194" width="220" height="62" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="500" y="222" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">docs</text>
  <text x="500" y="240" fill="#888888" font-size="11" text-anchor="middle">pending | blockedBy: schema</text>

  <!-- ================================================ -->
  <!-- Arrows: endpoints -> tests, docs -> deploy -->
  <!-- ================================================ -->
  <circle cx="220" cy="256" r="3" fill="#22c55e"/>
  <circle cx="500" cy="256" r="3" fill="#22c55e"/>

  <!-- endpoints -> tests (straight down) -->
  <path d="M 220 259 L 220 310" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- docs -> deploy (diagonal down-left) -->
  <path d="M 500 259 L 500 310" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ================================================ -->
  <!-- Row 3: tests (pending), deploy (pending) -->
  <!-- ================================================ -->

  <!-- tests -->
  <rect x="110" y="310" width="220" height="62" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="220" y="338" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">tests</text>
  <text x="220" y="356" fill="#888888" font-size="11" text-anchor="middle">pending | blockedBy: endpoints</text>

  <!-- deploy -->
  <rect x="390" y="310" width="220" height="62" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="500" y="338" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">deploy</text>
  <text x="500" y="356" fill="#888888" font-size="11" text-anchor="middle">pending | blockedBy: tests, docs</text>

  <!-- Arrow: tests -> deploy (horizontal) -->
  <circle cx="330" cy="341" r="3" fill="#22c55e"/>
  <path d="M 333 341 L 390 341" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ================================================ -->
  <!-- Legend -->
  <!-- ================================================ -->
  <rect x="40" y="400" width="640" height="56" rx="8" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>

  <!-- completed -->
  <rect x="60" y="420" width="16" height="14" rx="3" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="84" y="432" fill="#1a1a1a" font-size="11">completed</text>

  <!-- in_progress -->
  <rect x="176" y="420" width="16" height="14" rx="3" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="200" y="432" fill="#1a1a1a" font-size="11">in_progress</text>

  <!-- pending -->
  <rect x="300" y="420" width="16" height="14" rx="3" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="324" y="432" fill="#1a1a1a" font-size="11">pending</text>

  <!-- arrow meaning -->
  <line x1="400" y1="427" x2="432" y2="427" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="440" y="432" fill="#888888" font-size="11">blockedBy (dependency direction)</text>

</svg>