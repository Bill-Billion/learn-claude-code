<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="460" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="380" y="32" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">L3: toolResultBudget</text>
  <text x="380" y="50" fill="#888888" font-size="12" text-anchor="middle">Persist Large Results to Disk</text>

  <!-- Problem box -->
  <rect x="24" y="66" width="712" height="42" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="40" y="84" fill="#1a1a1a" font-size="13" font-weight="700">Problem</text>
  <text x="40" y="100" fill="#888888" font-size="11">Model reads 30 files in one turn — tool_results total 500 KB, filling the entire context window.</text>

  <!-- Before label -->
  <text x="180" y="132" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Before</text>

  <!-- Before terminal box -->
  <rect x="24" y="142" width="312" height="120" rx="4" fill="#2d2d2d"/>
  <text x="40" y="168" fill="#22c55e" font-size="11" font-family="monospace">tool_result: (78 KB)  ...</text>
  <text x="40" y="190" fill="#22c55e" font-size="11" font-family="monospace">tool_result: (142 KB) ...</text>
  <text x="40" y="212" fill="#22c55e" font-size="11" font-family="monospace">tool_result: (290 KB) ...</text>
  <text x="40" y="248" fill="#888888" font-size="11" font-family="monospace">total: 510 KB</text>

  <!-- Over budget label -->
  <text x="180" y="282" fill="#888888" font-size="11" font-weight="600" text-anchor="middle">510 KB — over budget</text>

  <!-- Arrow from Before to After -->
  <line x1="342" y1="202" x2="410" y2="202" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- After label -->
  <text x="570" y="132" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">After</text>

  <!-- After terminal box -->
  <rect x="416" y="142" width="320" height="120" rx="4" fill="#2d2d2d"/>
  <text x="432" y="168" fill="#22c55e" font-size="11" font-family="monospace">&lt;persisted-output&gt;</text>
  <text x="432" y="190" fill="#22c55e" font-size="11" font-family="monospace">  path: .task_outputs/t1.txt</text>
  <text x="432" y="212" fill="#22c55e" font-size="11" font-family="monospace">  preview: (first 2000 chars)</text>
  <text x="432" y="248" fill="#22c55e" font-size="11" font-family="monospace">total: ~18 KB</text>

  <!-- Within budget label -->
  <text x="570" y="282" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle">18 KB — within budget</text>

  <!-- How it works container -->
  <rect x="24" y="304" width="712" height="108" rx="8" fill="#fafafa" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="40" y="330" fill="#1a1a1a" font-size="13" font-weight="700">How it works</text>

  <text x="40" y="352" fill="#1a1a1a" font-size="11" font-weight="600">1.</text>
  <text x="56" y="352" fill="#888888" font-size="11">Sum the size of all tool_result blocks in the last user message.</text>

  <text x="40" y="372" fill="#1a1a1a" font-size="11" font-weight="600">2.</text>
  <text x="56" y="372" fill="#888888" font-size="11">If total &gt; 200 KB, sort by size desc, persist largest to .task_outputs/tool-results/</text>

  <text x="40" y="392" fill="#1a1a1a" font-size="11" font-weight="600">3.</text>
  <text x="56" y="392" fill="#888888" font-size="11">Keep only &lt;persisted-output&gt; marker + first 2000 chars preview in context.</text>

  <!-- Result box -->
  <rect x="24" y="424" width="712" height="28" rx="14" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="40" y="443" fill="#22c55e" font-size="12" font-weight="600">Result: Data saved to disk. Context reduced from 510 KB to ~18 KB. 0 API calls.</text>
</svg>