<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr-g" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-k" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="500" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="460" y="32" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Context Compact Overview</text>
  <text x="460" y="50" fill="#888888" font-size="12" text-anchor="middle">Compression before each LLM call — three trigger modes</text>
  <line x1="40" y1="62" x2="880" y2="62" stroke="#d0d0d0" stroke-width="1"/>

  <!-- ===== ROW 1: messages[] → Pipeline → LLM → TOOL_HANDLERS ===== -->

  <!-- messages[] box -->
  <rect x="30" y="86" width="120" height="54" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="90" y="110" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle" font-family="monospace">messages[]</text>
  <text x="90" y="126" fill="#888888" font-size="10" text-anchor="middle">history</text>

  <!-- Arrow: messages → pipeline (enters at L3, the first preprocessor) -->
  <path d="M 150 113 L 170 113 L 170 145 L 204 145" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- ===== Compression Pipeline container ===== -->
  <rect x="190" y="72" width="290" height="350" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="335" y="96" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Compression Pipeline</text>

  <!-- Mode 1 label -->
  <rect x="206" y="106" width="258" height="20" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="335" y="120" fill="#22c55e" font-size="9" font-weight="700" text-anchor="middle">MODE 1  Per-turn auto · 0 API calls</text>

  <!-- L3 box -->
  <rect x="206" y="134" width="258" height="30" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="335" y="154" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle" font-family="monospace">L3 tool_result_budget</text>

  <!-- down arrow L3 → L1 -->
  <line x1="335" y1="164" x2="335" y2="172" stroke="#22c55e" stroke-width="2"/>

  <!-- L1 box -->
  <rect x="206" y="172" width="258" height="30" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="335" y="192" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle" font-family="monospace">L1 snip_compact</text>

  <!-- down arrow L1 → L2 -->
  <line x1="335" y1="202" x2="335" y2="210" stroke="#22c55e" stroke-width="2"/>

  <!-- L2 box -->
  <rect x="206" y="210" width="258" height="30" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="335" y="230" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle" font-family="monospace">L2 micro_compact</text>

  <!-- connector L2 → decision -->
  <line x1="335" y1="240" x2="335" y2="262" stroke="#22c55e" stroke-width="2"/>

  <!-- Decision diamond -->
  <polygon points="335,262 380,294 335,326 290,294" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="335" y="291" fill="#1a1a1a" font-size="9" font-weight="600" text-anchor="middle">tokens &gt;</text>
  <text x="335" y="302" fill="#1a1a1a" font-size="9" font-weight="600" text-anchor="middle">threshold?</text>

  <!-- NO → right exit from diamond -->
  <line x1="376" y1="294" x2="480" y2="294" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="286" fill="#22c55e" font-size="10" font-weight="700">NO</text>

  <!-- YES → down -->
  <line x1="335" y1="322" x2="335" y2="336" stroke="#22c55e" stroke-width="2"/>
  <text x="352" y="332" fill="#1a1a1a" font-size="9" font-weight="600">YES</text>

  <!-- Mode 2 label -->
  <rect x="206" y="338" width="258" height="20" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="335" y="352" fill="#22c55e" font-size="9" font-weight="700" text-anchor="middle">MODE 2  Conditional · 1 API call</text>

  <!-- L4 box -->
  <rect x="206" y="366" width="258" height="30" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="335" y="386" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle" font-family="monospace">L4 compact_history</text>

  <!-- L4 exit arrow right -->
  <line x1="464" y1="381" x2="480" y2="381" stroke="#22c55e" stroke-width="2"/>

  <!-- ===== Merge point: NO path (y=294) and L4 path (y=381) merge and go to LLM ===== -->
  <path d="M 480 294 L 500 294 L 500 113 L 538 113" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-g)"/>
  <circle cx="480" cy="294" r="3" fill="#22c55e"/>
  <path d="M 480 381 L 500 381 L 500 294" fill="none" stroke="#22c55e" stroke-width="2"/>
  <circle cx="480" cy="381" r="3" fill="#22c55e"/>
  <circle cx="500" cy="294" r="3" fill="#22c55e"/>

  <!-- ===== LLM box ===== -->
  <rect x="540" y="86" width="120" height="54" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="600" y="108" fill="#1a1a1a" font-size="16" font-weight="700" text-anchor="middle">LLM</text>
  <text x="600" y="126" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">stop_reason?</text>

  <!-- Arrow: LLM → TOOL_HANDLERS (tool_use) -->
  <line x1="660" y1="113" x2="708" y2="113" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="684" y="103" fill="#22c55e" font-size="9" font-weight="600" text-anchor="middle">tool_use</text>

  <!-- ===== TOOL_HANDLERS box ===== -->
  <rect x="710" y="82" width="178" height="62" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="799" y="106" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle">TOOL_HANDLERS</text>
  <text x="799" y="124" fill="#888888" font-size="11" text-anchor="middle" font-family="monospace">bash · read · write ...</text>

  <!-- Arrow: LLM → Return Result (end_turn) -->
  <line x1="600" y1="140" x2="600" y2="170" stroke="#888888" stroke-width="1.5" marker-end="url(#arr-k)"/>
  <text x="594" y="158" fill="#888888" font-size="10" font-weight="600" text-anchor="end">end_turn</text>

  <!-- Return Result pill -->
  <rect x="540" y="174" width="120" height="32" rx="16" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="600" y="195" fill="#888888" font-size="12" font-weight="600" text-anchor="middle">Return Result</text>

  <!-- ===== Loop-back: TOOL_HANDLERS → messages[] ===== -->
  <path d="M 799 144 L 799 462 L 90 462 L 90 140" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-g)"/>
  <circle cx="799" cy="144" r="3" fill="#22c55e"/>
  <!-- Loop label -->
  <text x="430" y="480" fill="#888888" font-size="11" text-anchor="middle">Tool results appended to messages[] → next turn → compress again → LLM</text>

  <!-- ===== Mode 3: Reactive trigger box (dashed border) ===== -->
  <rect x="560" y="240" width="210" height="86" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="576" y="250" width="178" height="20" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="665" y="264" fill="#22c55e" font-size="9" font-weight="700" text-anchor="middle">MODE 3  Reactive trigger</text>
  <text x="665" y="288" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">API returns prompt_too_long</text>
  <text x="665" y="308" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">reactive_compact → retry</text>

  <!-- Arrow: LLM error → reactive box (dashed gray, routed right of Return Result) -->
  <path d="M 648 140 L 648 158 L 690 158 L 690 240" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-k)"/>
  <text x="698" y="202" fill="#888888" font-size="9" font-weight="600">API error</text>

  <!-- Arrow: reactive → back to L3 (dashed green loop-back) -->
  <path d="M 665 326 L 665 430 L 178 430 L 178 155 L 204 155" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-g)"/>
  <text x="400" y="446" fill="#888888" font-size="10" text-anchor="middle">Retry back to compression pipeline</text>
</svg>
