<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="580" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="410" y="32" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Autonomous Agents Overview</text>
  <text x="410" y="50" fill="#888888" font-size="12" text-anchor="middle">Idle Polling + Auto-Claim + WORK / IDLE / SHUTDOWN Lifecycle</text>

  <!-- ====== SECTION 1: Lead Inner Loop ====== -->
  <rect x="30" y="70" width="760" height="100" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="50" y="92" fill="#1a1a1a" font-size="14" font-weight="700">Lead Inner Loop</text>
  <text x="220" y="92" fill="#888888" font-size="11">(LLM / tool cycle drives each turn)</text>

  <!-- turn box -->
  <rect x="50" y="106" width="70" height="36" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="85" y="129" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">turn</text>

  <!-- arrow turn → messages -->
  <line x1="120" y1="124" x2="148" y2="124" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- messages box -->
  <rect x="156" y="106" width="90" height="36" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="201" y="129" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">messages</text>

  <!-- arrow messages → prompt -->
  <line x1="246" y1="124" x2="274" y2="124" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- prompt box -->
  <rect x="282" y="106" width="76" height="36" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="320" y="129" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">prompt</text>

  <!-- arrow prompt → LLM -->
  <line x1="358" y1="124" x2="386" y2="124" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- LLM box -->
  <rect x="394" y="106" width="60" height="36" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="424" y="129" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">LLM</text>

  <!-- arrow LLM → tool dispatch -->
  <line x1="454" y1="124" x2="482" y2="124" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- tool dispatch box -->
  <rect x="490" y="100" width="280" height="48" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="630" y="120" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">Tool Dispatch</text>
  <text x="630" y="137" fill="#888888" font-size="10" text-anchor="middle" font-family="monospace">bash read write task send inbox ...</text>

  <!-- loop-back arrow from tool dispatch back to turn -->
  <circle cx="770" cy="124" r="3" fill="#22c55e"/>
  <path d="M 770 124 L 785 124 L 785 155 L 85 155 L 85 142" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="430" y="165" fill="#22c55e" font-size="10" font-weight="600" text-anchor="middle">loop back (stop_reason == tool_use)</text>

  <!-- ====== SECTION 2: Teammate Lifecycle ====== -->
  <rect x="30" y="190" width="760" height="250" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="50" y="214" fill="#1a1a1a" font-size="14" font-weight="700">Teammate Lifecycle</text>
  <text x="235" y="214" fill="#888888" font-size="11">(WORK → IDLE → SHUTDOWN)</text>

  <!-- WORK box -->
  <rect x="55" y="232" width="280" height="130" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="195" y="256" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">WORK Phase</text>

  <!-- WORK terminal mockup -->
  <rect x="70" y="266" width="250" height="82" rx="4" fill="#2d2d2d"/>
  <text x="82" y="284" fill="#22c55e" font-size="11" font-family="monospace">inbox → LLM → bash/read/write</text>
  <text x="82" y="300" fill="#22c55e" font-size="11" font-family="monospace">stop_reason == tool_use → loop</text>
  <text x="82" y="316" fill="#22c55e" font-size="11" font-family="monospace">stop_reason != tool_use → IDLE</text>
  <text x="82" y="336" fill="#888888" font-size="10" font-family="monospace">max 10 rounds per phase</text>

  <!-- IDLE box -->
  <rect x="470" y="232" width="300" height="130" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="620" y="256" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">IDLE Phase (poll 5s)</text>

  <!-- IDLE terminal mockup -->
  <rect x="485" y="266" width="270" height="82" rx="4" fill="#2d2d2d"/>
  <text x="497" y="284" fill="#22c55e" font-size="11" font-family="monospace">check inbox → msg → WORK</text>
  <text x="497" y="300" fill="#22c55e" font-size="11" font-family="monospace">scan_unclaimed → claim → WORK</text>
  <text x="497" y="316" fill="#22c55e" font-size="11" font-family="monospace">60s timeout → SHUTDOWN</text>
  <text x="497" y="336" fill="#888888" font-size="10" font-family="monospace">idle_poll() + claim_task()</text>

  <!-- Arrow: WORK → IDLE (main flow, below center) -->
  <line x1="335" y1="310" x2="470" y2="310" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="398" y="304" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle">task done</text>

  <!-- Arrow: IDLE → WORK (loop back, above center, dashed) -->
  <circle cx="470" cy="262" r="3" fill="#22c55e"/>
  <circle cx="335" cy="262" r="3" fill="#22c55e"/>
  <path d="M 470 262 Q 400 228, 335 262" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="398" y="240" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle">new task found</text>

  <!-- SHUTDOWN box -->
  <rect x="335" y="394" width="150" height="32" rx="16" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="410" y="415" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">SHUTDOWN</text>

  <!-- Arrow: IDLE → SHUTDOWN -->
  <path d="M 620 362 L 620 378 Q 620 388, 610 388 L 418 388 Q 410 388, 410 394" fill="none" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="530" y="382" fill="#888888" font-size="10">60s timeout</text>

  <!-- ====== SECTION 3: Changes Summary Table ====== -->
  <rect x="30" y="455" width="760" height="115" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="50" y="478" fill="#1a1a1a" font-size="14" font-weight="700">Key Capabilities</text>

  <!-- Table header line -->
  <line x1="50" y1="486" x2="770" y2="486" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Col headers -->
  <text x="60" y="502" fill="#1a1a1a" font-size="11" font-weight="600">Component</text>
  <text x="270" y="502" fill="#1a1a1a" font-size="11" font-weight="600">Behavior</text>

  <!-- Separator -->
  <line x1="50" y1="508" x2="770" y2="508" stroke="#d0d0d0" stroke-width="0.5"/>

  <!-- Row 1 -->
  <text x="60" y="524" fill="#1a1a1a" font-size="11" font-family="monospace">idle_poll</text>
  <text x="270" y="524" fill="#888888" font-size="11">Poll inbox + task board every 5s during IDLE; prioritize shutdown_request</text>

  <!-- Row 2 -->
  <text x="60" y="542" fill="#1a1a1a" font-size="11" font-family="monospace">scan_unclaimed_tasks</text>
  <text x="270" y="542" fill="#888888" font-size="11">Find pending tasks with no owner and resolved dependencies (can_start)</text>

  <!-- Row 3 -->
  <text x="60" y="560" fill="#1a1a1a" font-size="11" font-family="monospace">claim_task</text>
  <text x="270" y="560" fill="#888888" font-size="11">Auto-claim with owner check; rejects already-owned or blocked tasks</text>

</svg>