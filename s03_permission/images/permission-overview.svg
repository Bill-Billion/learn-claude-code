<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ag" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="ay" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <rect width="780" height="450" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Permission — Gate Before Tool Execution</text>
  <text x="400" y="50" fill="#888888" font-size="12" text-anchor="middle">check_permission() gates every tool call before dispatch</text>

  <!-- ════════════════════════════════════════
       ROW 1: messages[] → LLM → ◇tool_use → check_permission()
       y center = 105
       ════════════════════════════════════════ -->

  <!-- messages[] : x=30..155, y=83..127 -->
  <rect x="30" y="83" width="125" height="44" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="92" y="110" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle" font-family="monospace">messages[]</text>

  <!-- Arrow: messages[] → LLM -->
  <line x1="155" y1="105" x2="198" y2="105" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>

  <!-- LLM : x=200..335, y=79..131 -->
  <rect x="200" y="79" width="135" height="52" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="267" y="103" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">LLM</text>
  <text x="267" y="121" fill="#888888" font-size="11" text-anchor="middle">stop_reason = ?</text>

  <!-- Arrow: LLM → Diamond -->
  <line x1="335" y1="105" x2="383" y2="105" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>

  <!-- Diamond: tool_use? center=(425,105), tips at 385/465 horiz, 81/129 vert -->
  <polygon points="385,105 425,81 465,105 425,129" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="425" y="109" fill="#1a1a1a" font-size="10" font-weight="600" text-anchor="middle">tool_use</text>

  <!-- No → Return Result (downward, gray) -->
  <line x1="425" y1="129" x2="425" y2="162" stroke="#888888" stroke-width="1.5" marker-end="url(#ay)"/>
  <text x="437" y="150" fill="#888888" font-size="10" font-weight="600">No</text>
  <rect x="369" y="164" width="112" height="30" rx="15" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="425" y="184" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">Return Result</text>

  <!-- Yes → check_permission (rightward, green) -->
  <line x1="465" y1="105" x2="513" y2="105" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>
  <text x="487" y="97" fill="#22c55e" font-size="10" font-weight="600">Yes</text>

  <!-- ════════════════════════════════════════
       check_permission() container: x=515..758, y=68..228
       Dashed border (mutable)
       ════════════════════════════════════════ -->
  <rect x="515" y="68" width="243" height="160" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="636" y="90" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle" font-family="monospace">check_permission()</text>

  <!-- Gate 1 : x=531..742, y=100..128 -->
  <rect x="531" y="100" width="211" height="28" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="541" y="119" fill="#1a1a1a" font-size="11" font-weight="600">Gate 1</text>
  <text x="592" y="119" fill="#888888" font-size="11">Deny List</text>

  <!-- Gate 2 : y=134..162 -->
  <rect x="531" y="134" width="211" height="28" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="541" y="153" fill="#1a1a1a" font-size="11" font-weight="600">Gate 2</text>
  <text x="592" y="153" fill="#888888" font-size="11">Rule Matching</text>

  <!-- Gate 3 : y=168..196 -->
  <rect x="531" y="168" width="211" height="28" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="541" y="187" fill="#1a1a1a" font-size="11" font-weight="600">Gate 3</text>
  <text x="592" y="187" fill="#888888" font-size="11">User Approval</text>

  <!-- Connecting dots between gates -->
  <circle cx="636" cy="128" r="2" fill="#d0d0d0"/>
  <circle cx="636" cy="134" r="2" fill="#d0d0d0"/>
  <circle cx="636" cy="162" r="2" fill="#d0d0d0"/>
  <circle cx="636" cy="168" r="2" fill="#d0d0d0"/>

  <!-- ════════════════════════════════════════
       ROW 2: Denied / Passed paths
       ════════════════════════════════════════ -->

  <!-- DENIED: from (575,228) down to tool_result (575,390) -->
  <path d="M 575 228 L 575 390" fill="none" stroke="#888888" stroke-width="1.5" marker-end="url(#ay)"/>
  <text x="583" y="270" fill="#888888" font-size="10" font-weight="600">Denied</text>

  <!-- PASSED: from (700,228) down to TOOL_HANDLERS -->
  <path d="M 700 228 L 700 290" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>
  <text x="708" y="265" fill="#22c55e" font-size="10" font-weight="600">Passed</text>

  <!-- TOOL_HANDLERS : x=634..770, y=292..344 -->
  <rect x="634" y="292" width="136" height="52" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="702" y="314" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle" font-family="monospace">TOOL_HANDLERS</text>
  <text x="702" y="332" fill="#888888" font-size="10" text-anchor="middle">bash / read / write</text>

  <!-- TOOL_HANDLERS → tool_result: down then left -->
  <path d="M 702 344 L 702 408 L 670 408" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>
  <circle cx="702" cy="408" r="3" fill="#22c55e"/>

  <!-- ════════════════════════════════════════
       ROW 3: tool_result
       x=530..670, y=390..426
       ════════════════════════════════════════ -->
  <rect x="530" y="390" width="140" height="36" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="600" y="413" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle" font-family="monospace">tool_result</text>

  <!-- tool_result → loop back to messages[] (left side entry, arrow points right) -->
  <path d="M 530 408 L 22 408 Q 14 408 14 398 L 14 115 Q 14 105 24 105 L 28 105" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#ag)"/>
  <circle cx="22" cy="408" r="3" fill="#22c55e"/>

  <!-- ════════════════════════════════════════
       Terminal mockup (code snippet)
       x=30..430, y=290..370
       ════════════════════════════════════════ -->
  <rect x="30" y="290" width="400" height="80" rx="4" fill="#2d2d2d"/>
  <text x="44" y="312" fill="#22c55e" font-size="10" font-family="monospace">if not check_permission(block):</text>
  <text x="44" y="326" fill="#22c55e" font-size="10" font-family="monospace">    results.append("Permission denied.")</text>
  <text x="44" y="340" fill="#22c55e" font-size="10" font-family="monospace">    continue</text>
  <text x="44" y="354" fill="#22c55e" font-size="10" font-family="monospace">output = TOOL_HANDLERS[name](**input)</text>
</svg>