<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 540" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="540" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="390" y="32" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">L4: compact_history</text>
  <text x="390" y="50" fill="#888888" font-size="12" text-anchor="middle">Full LLM Summary — when L1-L3 are exhausted and tokens still exceed threshold</text>

  <!-- Trigger Condition Box (dashed = mutable/accumulating) -->
  <rect x="24" y="66" width="732" height="48" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="40" y="86" fill="#1a1a1a" font-size="13" font-weight="700">Trigger Condition</text>
  <text x="40" y="102" fill="#888888" font-size="11">L1-L3 pre-processing complete; estimated tokens &gt; contextWindow - maxOutputTokens - 13,000</text>

  <!-- ===== Step 1 ===== -->
  <rect x="24" y="134" width="224" height="140" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="136" y="158" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Step 1</text>
  <text x="136" y="176" fill="#22c55e" font-size="12" font-weight="600" text-anchor="middle">Save Transcript</text>
  <line x1="40" y1="186" x2="232" y2="186" stroke="#d0d0d0" stroke-width="1"/>
  <text x="40" y="204" fill="#888888" font-size="11">Full conversation written to</text>
  <!-- Terminal mockup for path -->
  <rect x="40" y="212" width="188" height="20" rx="4" fill="#2d2d2d"/>
  <text x="50" y="226" fill="#22c55e" font-size="11" font-family="monospace">.transcripts/</text>
  <text x="40" y="252" fill="#888888" font-size="10">JSONL format, one msg per line</text>
  <text x="40" y="264" fill="#888888" font-size="10">Preserves recoverable record</text>

  <!-- Arrow Step 1 → Step 2 -->
  <circle cx="252" cy="204" r="3" fill="#22c55e"/>
  <line x1="255" y1="204" x2="288" y2="204" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ===== Step 2 ===== -->
  <rect x="294" y="134" width="224" height="140" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="406" y="158" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Step 2</text>
  <text x="406" y="176" fill="#22c55e" font-size="12" font-weight="600" text-anchor="middle">LLM Generates Summary</text>
  <line x1="310" y1="186" x2="502" y2="186" stroke="#d0d0d0" stroke-width="1"/>
  <text x="310" y="204" fill="#888888" font-size="11">Send history to LLM</text>
  <text x="310" y="220" fill="#888888" font-size="10">Summary must include:</text>
  <text x="310" y="234" fill="#888888" font-size="10">goals, concepts, files, errors,</text>
  <text x="310" y="248" fill="#888888" font-size="10">resolutions, user msgs, TODOs,</text>
  <text x="310" y="262" fill="#888888" font-size="10">current state, next steps</text>

  <!-- Arrow Step 2 → Step 3 -->
  <circle cx="522" cy="204" r="3" fill="#22c55e"/>
  <line x1="525" y1="204" x2="558" y2="204" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ===== Step 3 ===== -->
  <rect x="564" y="134" width="192" height="140" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="660" y="158" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Step 3</text>
  <text x="660" y="176" fill="#22c55e" font-size="12" font-weight="600" text-anchor="middle">Replace Messages</text>
  <line x1="580" y1="186" x2="740" y2="186" stroke="#d0d0d0" stroke-width="1"/>
  <text x="580" y="204" fill="#888888" font-size="11">All old msgs replaced</text>
  <text x="580" y="220" fill="#888888" font-size="11">with 1 summary message</text>
  <text x="580" y="240" fill="#888888" font-size="10">Attaches recently_read</text>
  <text x="580" y="254" fill="#888888" font-size="10">file list for re-access</text>

  <!-- ===== Before / After Comparison ===== -->

  <!-- Before Compaction -->
  <rect x="24" y="300" width="350" height="128" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="199" y="324" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">Before Compaction</text>
  <line x1="40" y1="332" x2="358" y2="332" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Message blocks row -->
  <rect x="44" y="344" width="52" height="22" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="70" y="359" fill="#1a1a1a" font-size="9" text-anchor="middle">user</text>

  <rect x="104" y="344" width="60" height="22" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="134" y="359" fill="#1a1a1a" font-size="9" text-anchor="middle">assistant</text>

  <rect x="172" y="344" width="52" height="22" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="198" y="359" fill="#1a1a1a" font-size="9" text-anchor="middle">user</text>

  <rect x="232" y="344" width="60" height="22" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="262" y="359" fill="#1a1a1a" font-size="9" text-anchor="middle">assistant</text>

  <rect x="300" y="344" width="52" height="22" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="326" y="359" fill="#1a1a1a" font-size="9" text-anchor="middle">user</text>

  <text x="199" y="386" fill="#888888" font-size="10" text-anchor="middle">... many more messages ...</text>
  <text x="199" y="414" fill="#888888" font-size="11" text-anchor="middle">~180 messages, ~62K tokens</text>

  <!-- Arrow Before → After -->
  <circle cx="378" cy="364" r="3" fill="#22c55e"/>
  <line x1="381" y1="364" x2="416" y2="364" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- After Compaction -->
  <rect x="422" y="300" width="334" height="128" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="589" y="324" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">After Compaction</text>
  <line x1="438" y1="332" x2="740" y2="332" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Single summary block (terminal mockup) -->
  <rect x="438" y="344" width="302" height="44" rx="4" fill="#2d2d2d"/>
  <text x="450" y="362" fill="#22c55e" font-size="10" font-family="monospace">[Compacted] Goal: create hello.py</text>
  <text x="450" y="378" fill="#22c55e" font-size="10" font-family="monospace">Recent files: hello.py, README.md</text>

  <text x="589" y="414" fill="#888888" font-size="11" text-anchor="middle">~1 message, ~1K tokens</text>

  <!-- ===== Circuit Breaker ===== -->
  <rect x="24" y="452" width="732" height="72" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="40" y="476" fill="#1a1a1a" font-size="13" font-weight="700">Circuit Breaker</text>
  <line x1="40" y1="484" x2="740" y2="484" stroke="#d0d0d0" stroke-width="1"/>
  <text x="40" y="502" fill="#888888" font-size="11">3 consecutive autocompact failures → stop retrying</text>
  <text x="40" y="518" fill="#888888" font-size="10">Prevents wasting API calls when context is unrecoverable</text>
</svg>