<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="400" fill="#ffffff"/>

  <!-- Title -->
  <text x="390" y="32" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">L2: micro_compact</text>
  <text x="390" y="50" fill="#888888" font-size="12" text-anchor="middle">Replace old tool_result with one-line placeholder</text>

  <!-- Problem box -->
  <rect x="24" y="66" width="732" height="38" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="40" y="90" fill="#1a1a1a" font-size="12" font-weight="700">Problem</text>
  <text x="108" y="90" fill="#888888" font-size="11">Agent read 10 files. Reads 1-7 still in context, no longer needed, wasting ~25K chars.</text>

  <!-- Before section title -->
  <text x="192" y="130" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Before (all 10 results intact)</text>

  <!-- Before container -->
  <rect x="24" y="142" width="336" height="150" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Before terminal mockup -->
  <rect x="36" y="154" width="312" height="100" rx="4" fill="#2d2d2d"/>
  <text x="48" y="174" fill="#22c55e" font-size="11" font-family="monospace">Read A: (full content, 3200 chars)</text>
  <text x="48" y="192" fill="#22c55e" font-size="11" font-family="monospace">Read B: (full content, 1800 chars)</text>
  <text x="48" y="210" fill="#22c55e" font-size="11" font-family="monospace">Read C: (full content, 4500 chars)</text>
  <text x="48" y="228" fill="#888888" font-size="10" font-family="monospace">... 4 more old results ...</text>
  <text x="48" y="246" fill="#22c55e" font-size="11" font-family="monospace">Read J: (full content, 2800 chars)</text>

  <!-- Before label -->
  <text x="192" y="278" fill="#888888" font-size="11" font-weight="600" text-anchor="middle">7 old results waste ~25K chars</text>

  <!-- Arrow from Before to After -->
  <text x="393" y="210" fill="#22c55e" font-size="10" font-weight="600" text-anchor="middle">compact</text>
  <line x1="368" y1="217" x2="418" y2="217" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- After section title -->
  <text x="588" y="130" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">After (keep recent 3 intact)</text>

  <!-- After container (dashed = mutable) -->
  <rect x="420" y="142" width="336" height="150" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- After terminal mockup -->
  <rect x="432" y="154" width="312" height="100" rx="4" fill="#2d2d2d"/>
  <text x="444" y="174" fill="#888888" font-size="10" font-family="monospace">[Compacted. Re-run if needed.]</text>
  <text x="444" y="192" fill="#888888" font-size="10" font-family="monospace">[Compacted. Re-run if needed.]</text>
  <text x="444" y="210" fill="#888888" font-size="10" font-family="monospace">[Compacted. Re-run if needed.]</text>
  <text x="444" y="228" fill="#888888" font-size="10" font-family="monospace">... 4 more compacted ...</text>
  <text x="444" y="246" fill="#22c55e" font-size="11" font-family="monospace">Read J: (full content, 2800 chars)</text>

  <!-- After label -->
  <text x="588" y="278" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle">Only recent 3 kept, 7 replaced</text>

  <!-- How it works section -->
  <rect x="24" y="304" width="732" height="80" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="40" y="328" fill="#1a1a1a" font-size="12" font-weight="700">How it works</text>
  <text x="148" y="328" fill="#888888" font-size="11">Iterate tool_result blocks; keep most recent 3 intact, replace older ones with placeholder.</text>
  <text x="40" y="350" fill="#1a1a1a" font-size="12" font-weight="700">Scope</text>
  <text x="148" y="350" fill="#888888" font-size="11">Applies to COMPACTABLE_TOOLS: Read, Bash, Grep, Glob, WebSearch, WebFetch, Edit, Write.</text>
  <text x="40" y="372" fill="#1a1a1a" font-size="12" font-weight="700">Cost</text>
  <text x="148" y="372" fill="#888888" font-size="11">0 API calls. Pure text replacement. If model needs old content, re-run the tool.</text>
</svg>