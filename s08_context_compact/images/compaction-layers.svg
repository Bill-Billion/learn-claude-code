<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 780" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="780" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="410" y="34" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Context Compaction — Four-Layer Pipeline</text>
  <text x="410" y="54" fill="#888888" font-size="12" text-anchor="middle">Cheap first, expensive last — 3 pre-processors (0 API) + 1 LLM summary + emergency fallback</text>

  <!-- ===== Design Principles (left) ===== -->
  <rect x="24" y="74" width="260" height="92" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="154" y="96" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Design Principles</text>
  <text x="154" y="116" fill="#888888" font-size="11" text-anchor="middle">Text ops before dropping messages</text>
  <text x="154" y="132" fill="#888888" font-size="11" text-anchor="middle">Drop messages before calling LLM</text>
  <text x="154" y="148" fill="#888888" font-size="11" text-anchor="middle">LLM summary before emergency trim</text>

  <!-- ===== Cost Escalation (right) ===== -->
  <rect x="536" y="74" width="260" height="92" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="666" y="96" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Cost Escalation</text>
  <text x="666" y="116" fill="#888888" font-size="11" text-anchor="middle">Text ops (0 API) — lowest cost</text>
  <line x1="556" y1="126" x2="776" y2="126" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="666" y="142" fill="#888888" font-size="11" text-anchor="middle">LLM summary (1 API) — moderate cost</text>
  <line x1="556" y1="152" x2="776" y2="152" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="666" y="166" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle" font-family="monospace">0 API -> 0 API -> 0 API -> 1 API</text>

  <!-- ===== PRE-PROCESSING PIPELINE SECTION ===== -->
  <rect x="24" y="186" width="772" height="300" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="46" y="210" fill="#1a1a1a" font-size="14" font-weight="700">Pre-Processing Pipeline</text>
  <text x="260" y="210" fill="#888888" font-size="11">(Execution order: L3 → L1 → L2 | runs before each LLM call | 0 API cost)</text>

  <!-- L3: toolResultBudget -->
  <rect x="56" y="226" width="700" height="68" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="56" y="226" width="42" height="68" rx="8" fill="#1a1a1a"/>
  <rect x="78" y="226" width="20" height="68" fill="#1a1a1a"/>
  <text x="77" y="266" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">L3</text>
  <text x="116" y="250" fill="#1a1a1a" font-size="14" font-weight="700">toolResultBudget</text>
  <text x="116" y="268" fill="#888888" font-size="11">tool_result total &gt; 200KB → persist largest items to disk</text>
  <text x="116" y="284" fill="#888888" font-size="11">Preserves full content in .task_outputs/ before placeholders</text>
  <!-- Terminal snippet for L3 -->
  <rect x="546" y="238" width="196" height="42" rx="4" fill="#2d2d2d"/>
  <text x="558" y="256" fill="#22c55e" font-size="10" font-family="monospace">total &gt; 200KB?</text>
  <text x="558" y="270" fill="#22c55e" font-size="10" font-family="monospace">  persist_large_output()</text>
  <!-- 0 API badge -->
  <rect x="718" y="230" width="32" height="16" rx="3" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
  <text x="734" y="241" fill="#22c55e" font-size="9" font-weight="600" text-anchor="middle">0 API</text>

  <!-- Arrow L3 → L1 -->
  <line x1="410" y1="294" x2="410" y2="314" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- L1: snipCompact -->
  <rect x="56" y="318" width="700" height="68" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="56" y="318" width="42" height="68" rx="8" fill="#1a1a1a"/>
  <rect x="78" y="318" width="20" height="68" fill="#1a1a1a"/>
  <text x="77" y="358" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">L1</text>
  <text x="116" y="342" fill="#1a1a1a" font-size="14" font-weight="700">snipCompact</text>
  <text x="116" y="360" fill="#888888" font-size="11">messages &gt; 50 → keep head 3 + tail 47, trim middle</text>
  <text x="116" y="376" fill="#888888" font-size="11">Boundary guard: tool_use must stay paired with tool_result</text>
  <!-- Terminal snippet for L1 -->
  <rect x="546" y="330" width="196" height="42" rx="4" fill="#2d2d2d"/>
  <text x="558" y="348" fill="#22c55e" font-size="10" font-family="monospace">len(msgs) &gt; 50?</text>
  <text x="558" y="362" fill="#22c55e" font-size="10" font-family="monospace">  head[:3] + tail[47:]</text>
  <!-- 0 API badge -->
  <rect x="718" y="322" width="32" height="16" rx="3" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
  <text x="734" y="333" fill="#22c55e" font-size="9" font-weight="600" text-anchor="middle">0 API</text>

  <!-- Arrow L1 → L2 -->
  <line x1="410" y1="386" x2="410" y2="406" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- L2: microCompact -->
  <rect x="56" y="410" width="700" height="68" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="56" y="410" width="42" height="68" rx="8" fill="#1a1a1a"/>
  <rect x="78" y="410" width="20" height="68" fill="#1a1a1a"/>
  <text x="77" y="450" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">L2</text>
  <text x="116" y="434" fill="#1a1a1a" font-size="14" font-weight="700">microCompact</text>
  <text x="116" y="452" fill="#888888" font-size="11">Old tool_result → one-line placeholder (keep most recent 3)</text>
  <text x="116" y="468" fill="#888888" font-size="11">Clears stale content while preserving recent working state</text>
  <!-- Terminal snippet for L2 -->
  <rect x="546" y="422" width="196" height="42" rx="4" fill="#2d2d2d"/>
  <text x="558" y="440" fill="#22c55e" font-size="10" font-family="monospace">keep_recent = 3</text>
  <text x="558" y="454" fill="#22c55e" font-size="10" font-family="monospace">  older → placeholder</text>
  <!-- 0 API badge -->
  <rect x="718" y="414" width="32" height="16" rx="3" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
  <text x="734" y="425" fill="#22c55e" font-size="9" font-weight="600" text-anchor="middle">0 API</text>

  <!-- ===== AUTO COMPACT SECTION ===== -->
  <rect x="24" y="508" width="772" height="110" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Arrow pre-processing → auto compact -->
  <line x1="410" y1="486" x2="410" y2="508" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="418" y="500" fill="#888888" font-size="10" font-weight="600">still over threshold?</text>

  <text x="46" y="534" fill="#1a1a1a" font-size="14" font-weight="700">Auto Compact (1 API call)</text>

  <!-- L4: compactHistory -->
  <rect x="56" y="544" width="700" height="62" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="56" y="544" width="42" height="62" rx="8" fill="#1a1a1a"/>
  <rect x="78" y="544" width="20" height="62" fill="#1a1a1a"/>
  <text x="77" y="581" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">L4</text>
  <text x="116" y="566" fill="#1a1a1a" font-size="14" font-weight="700">compactHistory</text>
  <text x="116" y="582" fill="#888888" font-size="11">tokens &gt; threshold → LLM summary → replace messages</text>
  <text x="116" y="598" fill="#888888" font-size="11" font-style="italic">Threshold: contextWindow - maxOutputTokens - 13K | 3-fail breaker</text>
  <!-- Terminal snippet for L4 -->
  <rect x="546" y="554" width="196" height="42" rx="4" fill="#2d2d2d"/>
  <text x="558" y="572" fill="#22c55e" font-size="10" font-family="monospace">write_transcript()</text>
  <text x="558" y="586" fill="#22c55e" font-size="10" font-family="monospace">summarize_history()</text>
  <!-- 1 API badge -->
  <rect x="718" y="548" width="32" height="16" rx="3" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
  <text x="734" y="559" fill="#22c55e" font-size="9" font-weight="600" text-anchor="middle">1 API</text>

  <!-- ===== EMERGENCY FALLBACK SECTION ===== -->
  <rect x="24" y="642" width="772" height="118" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Arrow auto compact → emergency -->
  <line x1="410" y1="606" x2="410" y2="642" stroke="#888888" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="418" y="628" fill="#888888" font-size="10" font-weight="600">API returns prompt_too_long?</text>

  <text x="46" y="666" fill="#1a1a1a" font-size="14" font-weight="700">Emergency Fallback</text>

  <!-- EM: reactiveCompact -->
  <rect x="56" y="678" width="700" height="68" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="56" y="678" width="50" height="68" rx="8" fill="#1a1a1a"/>
  <rect x="86" y="678" width="20" height="68" fill="#1a1a1a"/>
  <text x="81" y="718" fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle">EM</text>
  <text x="124" y="702" fill="#1a1a1a" font-size="14" font-weight="700">reactiveCompact</text>
  <text x="124" y="720" fill="#888888" font-size="11">API returns 413 / prompt_too_long → aggressive byte-level trim</text>
  <text x="124" y="736" fill="#888888" font-size="11">Keep last 5 msgs + summary | Retry: 1 | More aggressive</text>
  <!-- Terminal snippet for reactive -->
  <rect x="546" y="690" width="196" height="42" rx="4" fill="#2d2d2d"/>
  <text x="558" y="708" fill="#22c55e" font-size="10" font-family="monospace">summary + tail[-5:]</text>
  <text x="558" y="722" fill="#22c55e" font-size="10" font-family="monospace">  max_retries = 1</text>
</svg>