<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="430" y="34" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">System Prompt Assembly</text>
  <text x="430" y="52" fill="#888888" font-size="12" text-anchor="middle">PROMPT_SECTIONS + on-demand assembly + caching</text>

  <!-- ===== Row 1: Prompt Assembly Pipeline ===== -->

  <!-- Section label -->
  <text x="40" y="84" fill="#22c55e" font-size="11" font-weight="700">PROMPT ASSEMBLY</text>
  <line x1="40" y1="89" x2="820" y2="89" stroke="#d0d0d0" stroke-width="1"/>

  <!-- PROMPT_SECTIONS box -->
  <rect x="40" y="102" width="200" height="126" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="140" y="122" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">PROMPT_SECTIONS</text>
  <line x1="50" y1="130" x2="230" y2="130" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Terminal mockup inside PROMPT_SECTIONS -->
  <rect x="52" y="136" width="176" height="82" rx="4" fill="#2d2d2d"/>
  <text x="62" y="155" fill="#22c55e" font-size="11" font-family="monospace">identity  (always)</text>
  <text x="62" y="172" fill="#22c55e" font-size="11" font-family="monospace">tools     (always)</text>
  <text x="62" y="189" fill="#22c55e" font-size="11" font-family="monospace">workspace (always)</text>
  <text x="62" y="206" fill="#888888" font-size="11" font-family="monospace">memory    (on-demand)</text>

  <!-- Arrow: PROMPT_SECTIONS -> assemble -->
  <line x1="240" y1="165" x2="278" y2="165" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <circle cx="240" cy="165" r="3" fill="#22c55e"/>

  <!-- assemble_system_prompt box -->
  <rect x="286" y="102" width="230" height="126" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="401" y="122" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">assemble_system_prompt</text>
  <line x1="296" y1="130" x2="506" y2="130" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Terminal mockup inside assemble -->
  <rect x="296" y="136" width="210" height="82" rx="4" fill="#2d2d2d"/>
  <text x="306" y="155" fill="#888888" font-size="11" font-family="monospace">input:</text>
  <text x="355" y="155" fill="#22c55e" font-size="11" font-family="monospace">context dict</text>
  <text x="306" y="172" fill="#888888" font-size="11" font-family="monospace">always:</text>
  <text x="362" y="172" fill="#22c55e" font-size="11" font-family="monospace">id+tools+ws</text>
  <text x="306" y="189" fill="#888888" font-size="11" font-family="monospace">on-demand:</text>
  <text x="382" y="189" fill="#22c55e" font-size="11" font-family="monospace">memory</text>
  <text x="306" y="206" fill="#888888" font-size="11" font-family="monospace">output:</text>
  <text x="362" y="206" fill="#22c55e" font-size="11" font-family="monospace">join(parts)</text>

  <!-- Arrow: assemble -> get_system_prompt -->
  <line x1="516" y1="165" x2="554" y2="165" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <circle cx="516" cy="165" r="3" fill="#22c55e"/>

  <!-- get_system_prompt box -->
  <rect x="562" y="102" width="240" height="126" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="682" y="122" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">get_system_prompt</text>
  <line x1="572" y1="130" x2="792" y2="130" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Terminal mockup inside get_system_prompt -->
  <rect x="572" y="136" width="220" height="82" rx="4" fill="#2d2d2d"/>
  <text x="582" y="155" fill="#888888" font-size="11" font-family="monospace">key =</text>
  <text x="622" y="155" fill="#22c55e" font-size="11" font-family="monospace">json.dumps(ctx)</text>
  <text x="582" y="172" fill="#22c55e" font-size="11" font-family="monospace">hit  → return cached</text>
  <text x="582" y="189" fill="#22c55e" font-size="11" font-family="monospace">miss → assemble+store</text>
  <text x="582" y="206" fill="#888888" font-size="11" font-family="monospace">avoids re-assembly</text>

  <!-- ===== Arrow from cache down to LLM ===== -->
  <path d="M 682 228 L 682 268 Q 682 276 674 276 L 470 276 Q 462 276 462 284 L 462 322" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <circle cx="682" cy="228" r="3" fill="#22c55e"/>
  <rect x="536" y="250" width="134" height="18" rx="3" fill="#2d2d2d"/>
  <text x="603" y="263" fill="#22c55e" font-size="10" font-family="monospace" text-anchor="middle">system = prompt</text>

  <!-- ===== Row 2: Agent Loop ===== -->

  <!-- Section label -->
  <text x="40" y="308" fill="#888888" font-size="11" font-weight="700">AGENT LOOP</text>
  <line x1="40" y1="313" x2="820" y2="313" stroke="#d0d0d0" stroke-width="1"/>

  <!-- messages[] box -->
  <rect x="40" y="328" width="120" height="58" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="100" y="352" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">messages[]</text>
  <text x="100" y="370" fill="#888888" font-size="10" text-anchor="middle">accumulating</text>

  <!-- Arrow: messages -> compression -->
  <line x1="160" y1="357" x2="194" y2="357" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Compression + Loading box -->
  <rect x="202" y="328" width="180" height="58" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="292" y="352" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">Compress + Load</text>
  <text x="292" y="370" fill="#888888" font-size="10" text-anchor="middle">snip &gt; micro &gt; budget &gt; auto</text>

  <!-- Arrow: compression -> LLM -->
  <line x1="382" y1="357" x2="416" y2="357" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- LLM box -->
  <rect x="424" y="322" width="76" height="70" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="462" y="352" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">LLM</text>
  <text x="462" y="368" fill="#888888" font-size="10" text-anchor="middle">API call</text>

  <!-- Arrow: LLM -> diamond -->
  <line x1="500" y1="357" x2="540" y2="357" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Diamond decision -->
  <polygon points="548,357 578,337 608,357 578,377" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="578" y="361" fill="#1a1a1a" font-size="10" font-weight="600" text-anchor="middle">tool?</text>

  <!-- Arrow: diamond -> TOOL_HANDLERS (yes) -->
  <line x1="608" y1="357" x2="652" y2="357" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="628" y="349" fill="#22c55e" font-size="10" font-weight="600">yes</text>

  <!-- TOOL_HANDLERS box -->
  <rect x="660" y="328" width="150" height="58" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="735" y="352" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">TOOL_HANDLERS</text>
  <text x="735" y="370" fill="#888888" font-size="10" text-anchor="middle">bash | read | write</text>

  <!-- Arrow: diamond -> exit (no, downward) -->
  <line x1="578" y1="377" x2="578" y2="416" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="590" y="400" fill="#888888" font-size="10">no</text>

  <!-- Exit label -->
  <rect x="540" y="422" width="76" height="24" rx="12" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="578" y="438" fill="#1a1a1a" font-size="11" text-anchor="middle">return</text>

  <!-- ===== Loop back: TOOL_HANDLERS -> messages[] ===== -->
  <path d="M 735 386 L 735 460 Q 735 470 725 470 L 110 470 Q 100 470 100 460 L 100 386" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <circle cx="735" cy="386" r="3" fill="#22c55e"/>
  <circle cx="100" cy="386" r="3" fill="#22c55e"/>

  <!-- Loop label -->
  <rect x="310" y="458" width="230" height="20" rx="4" fill="#2d2d2d"/>
  <text x="425" y="473" fill="#22c55e" font-size="10" font-family="monospace" text-anchor="middle">result → messages → re-assemble</text>

  <!-- ===== Bottom: Table of sections ===== -->
  <rect x="40" y="490" width="780" height="24" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="54" y="506" fill="#1a1a1a" font-size="11" font-weight="700">Sections:</text>
  <text x="124" y="506" fill="#22c55e" font-size="11" font-family="monospace">identity</text>
  <text x="196" y="506" fill="#888888" font-size="11">(always)</text>
  <text x="258" y="506" fill="#22c55e" font-size="11" font-family="monospace">tools</text>
  <text x="300" y="506" fill="#888888" font-size="11">(always)</text>
  <text x="362" y="506" fill="#22c55e" font-size="11" font-family="monospace">workspace</text>
  <text x="448" y="506" fill="#888888" font-size="11">(always)</text>
  <text x="510" y="506" fill="#22c55e" font-size="11" font-family="monospace">memory</text>
  <text x="572" y="506" fill="#888888" font-size="11">(on-demand, if .memory/ exists)</text>
</svg>