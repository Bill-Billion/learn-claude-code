<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 660" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="660" fill="#ffffff"/>

  <!-- Title -->
  <text x="430" y="32" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Error Recovery</text>
  <text x="430" y="50" fill="#888888" font-size="12" text-anchor="middle">try/except wraps LLM calls — three recovery patterns</text>

  <!-- ===== Main Flow (top row) ===== -->

  <!-- messages box -->
  <rect x="30" y="76" width="96" height="44" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="78" y="103" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle">messages</text>

  <!-- Arrow: messages → prompt assembly -->
  <line x1="126" y1="98" x2="154" y2="98" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- prompt assembly box -->
  <rect x="160" y="76" width="120" height="44" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="220" y="95" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">prompt</text>
  <text x="220" y="110" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">assembly</text>

  <!-- Arrow: prompt assembly → compress+load -->
  <line x1="280" y1="98" x2="308" y2="98" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- compress + load box -->
  <rect x="314" y="76" width="132" height="44" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="380" y="95" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">compress +</text>
  <text x="380" y="110" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">load context</text>

  <!-- Arrow: compress+load → LLM -->
  <line x1="446" y1="98" x2="474" y2="98" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- LLM box (primary, black border, thicker) -->
  <rect x="480" y="70" width="112" height="56" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="536" y="96" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">LLM</text>
  <text x="536" y="112" fill="#888888" font-size="11" font-weight="600" text-anchor="middle" font-family="monospace">try/except</text>

  <!-- Arrow: LLM → TOOL_HANDLERS -->
  <line x1="592" y1="98" x2="620" y2="98" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- TOOL_HANDLERS box -->
  <rect x="626" y="76" width="164" height="44" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="708" y="95" fill="#1a1a1a" font-size="12" font-weight="600" text-anchor="middle">TOOL_HANDLERS</text>
  <text x="708" y="110" fill="#888888" font-size="11" text-anchor="middle">bash · read · write</text>

  <!-- Loop-back arrow from TOOL_HANDLERS to messages (dashed green, goes below the row) -->
  <circle cx="708" cy="120" r="3" fill="#22c55e"/>
  <path d="M 708 120 L 708 138 L 78 138 L 78 120" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="393" y="152" fill="#22c55e" font-size="10" font-weight="600" text-anchor="middle">tool result → append → next turn</text>

  <!-- ===== Error arrow from LLM down ===== -->
  <path d="M 536 126 L 536 180" fill="none" stroke="#888888" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="552" y="162" fill="#888888" font-size="10" font-weight="600">error</text>

  <!-- ===== Recovery Section Header ===== -->
  <rect x="30" y="188" width="800" height="28" rx="6" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="430" y="207" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle">Error Recovery — classify and recover, then continue back to LLM</text>

  <!-- ===== Path 1: max_tokens ===== -->
  <rect x="30" y="230" width="780" height="100" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Path 1 header -->
  <text x="50" y="254" fill="#1a1a1a" font-size="14" font-weight="700">Path 1</text>
  <rect x="108" y="240" width="102" height="20" rx="4" fill="#2d2d2d"/>
  <text x="159" y="254" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle" font-family="monospace">max_tokens</text>

  <!-- Path 1 description -->
  <text x="50" y="278" fill="#1a1a1a" font-size="11">Trigger: <tspan font-family="monospace" font-size="11">stop_reason == "max_tokens"</tspan></text>
  <text x="50" y="296" fill="#1a1a1a" font-size="11">Action: Escalate 8K → 64K (once) / continuation prompt (up to 3×)</text>
  <text x="50" y="314" fill="#888888" font-size="11">Truncated output NOT appended on first escalation — same request retried with more tokens</text>

  <!-- Path 1 terminal snippet -->
  <rect x="590" y="244" width="200" height="44" rx="4" fill="#2d2d2d"/>
  <text x="600" y="260" fill="#22c55e" font-size="10" font-family="monospace">max_tokens = 64000</text>
  <text x="600" y="276" fill="#22c55e" font-size="10" font-family="monospace">continue  # retry</text>

  <!-- Path 1 → recovery bus -->
  <path d="M 810 300 L 830 300" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <circle cx="810" cy="300" r="3" fill="#22c55e"/>
  <circle cx="830" cy="300" r="3" fill="#22c55e"/>

  <!-- ===== Path 2: prompt_too_long ===== -->
  <rect x="30" y="344" width="780" height="100" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Path 2 header -->
  <text x="50" y="368" fill="#1a1a1a" font-size="14" font-weight="700">Path 2</text>
  <rect x="108" y="354" width="136" height="20" rx="4" fill="#2d2d2d"/>
  <text x="176" y="368" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle" font-family="monospace">prompt_too_long</text>

  <!-- Path 2 description -->
  <text x="50" y="392" fill="#1a1a1a" font-size="11">Trigger: API returns 413 / context exceeds limit</text>
  <text x="50" y="410" fill="#1a1a1a" font-size="11">Action: Reactive compact → retry (one chance only)</text>
  <text x="50" y="428" fill="#888888" font-size="11">If still over limit after compaction → exit (compacting again won't help)</text>

  <!-- Path 2 terminal snippet -->
  <rect x="548" y="358" width="244" height="58" rx="4" fill="#2d2d2d"/>
  <text x="558" y="374" fill="#22c55e" font-size="10" font-family="monospace">messages[:] =</text>
  <text x="558" y="390" fill="#22c55e" font-size="10" font-family="monospace">  reactive_compact(messages)</text>
  <text x="558" y="406" fill="#22c55e" font-size="10" font-family="monospace">continue  # retry once</text>

  <!-- Path 2 → recovery bus -->
  <path d="M 810 414 L 830 414" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <circle cx="810" cy="414" r="3" fill="#22c55e"/>
  <circle cx="830" cy="414" r="3" fill="#22c55e"/>

  <!-- ===== Path 3: 429/529 ===== -->
  <rect x="30" y="458" width="780" height="106" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Path 3 header -->
  <text x="50" y="482" fill="#1a1a1a" font-size="14" font-weight="700">Path 3</text>
  <rect x="108" y="468" width="74" height="20" rx="4" fill="#2d2d2d"/>
  <text x="145" y="482" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle" font-family="monospace">429/529</text>

  <!-- Path 3 description -->
  <text x="50" y="506" fill="#1a1a1a" font-size="11">Trigger: <tspan font-family="monospace" font-size="11">RateLimitError / OverloadedError</tspan></text>
  <text x="50" y="524" fill="#1a1a1a" font-size="11">Action: Exponential backoff + jitter (up to 10 retries)</text>
  <text x="50" y="542" fill="#888888" font-size="11">3× consecutive 529 → fallback model. min(500×2^n, 32s) + jitter</text>

  <!-- Path 3 terminal snippet -->
  <rect x="548" y="472" width="244" height="76" rx="4" fill="#2d2d2d"/>
  <text x="558" y="488" fill="#22c55e" font-size="10" font-family="monospace">delay = min(500*2**n, 32000)</text>
  <text x="558" y="504" fill="#22c55e" font-size="10" font-family="monospace">delay += random(0, 25%)</text>
  <text x="558" y="520" fill="#22c55e" font-size="10" font-family="monospace">time.sleep(delay / 1000)</text>
  <text x="558" y="536" fill="#22c55e" font-size="10" font-family="monospace">continue  # retry</text>

  <!-- Path 3 → recovery bus → single merged arrow back into LLM -->
  <path d="M 810 534 L 830 534 L 830 63 L 536 63 L 536 70" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <circle cx="810" cy="534" r="3" fill="#22c55e"/>

  <!-- ===== Bottom note ===== -->
  <rect x="30" y="580" width="800" height="42" rx="6" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="50" y="598" fill="#888888" font-size="11">These are the 3 most common recovery patterns. The system has 13+ reason codes</text>
  <text x="50" y="613" fill="#888888" font-size="11">(image_error, aborted_streaming, etc.), each with dedicated handling. All recovery paths → continue back to LLM loop.</text>

</svg>