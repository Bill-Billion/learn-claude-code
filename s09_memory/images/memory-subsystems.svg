<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 556" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="556" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="410" y="32" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Memory Subsystems</text>
  <text x="410" y="50" fill="#888888" font-size="12" text-anchor="middle">Store · Load · Extract · Consolidate</text>

  <!-- ═══════════ Row 1: Four subsystems ═══════════ -->

  <!-- Store -->
  <rect x="20" y="72" width="175" height="104" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="107" y="94" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Store</text>
  <line x1="32" y1="102" x2="183" y2="102" stroke="#d0d0d0" stroke-width="1"/>
  <text x="36" y="120" fill="#888888" font-size="11">.memory/*.md files</text>
  <text x="36" y="136" fill="#888888" font-size="11">MEMORY.md index</text>
  <text x="36" y="154" fill="#888888" font-size="10">YAML frontmatter metadata</text>

  <!-- Arrow: Store -> Load -->
  <line x1="199" y1="124" x2="225" y2="124" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <circle cx="199" cy="124" r="3" fill="#22c55e"/>

  <!-- Load -->
  <rect x="230" y="72" width="175" height="104" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="317" y="94" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Load</text>
  <line x1="242" y1="102" x2="393" y2="102" stroke="#d0d0d0" stroke-width="1"/>
  <text x="242" y="120" fill="#888888" font-size="11">Index in SYSTEM prompt</text>
  <text x="242" y="136" fill="#888888" font-size="11">LLM side-query picks files</text>
  <text x="242" y="154" fill="#888888" font-size="10">max 5, fallback to keywords</text>

  <!-- Arrow: Load -> Extract -->
  <line x1="409" y1="124" x2="435" y2="124" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <circle cx="409" cy="124" r="3" fill="#22c55e"/>

  <!-- Extract -->
  <rect x="440" y="72" width="170" height="104" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="525" y="94" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Extract</text>
  <line x1="452" y1="102" x2="598" y2="102" stroke="#d0d0d0" stroke-width="1"/>
  <text x="452" y="120" fill="#888888" font-size="11">Triggered after each turn</text>
  <text x="452" y="136" fill="#888888" font-size="11">LLM extracts prefs/facts</text>
  <text x="452" y="154" fill="#888888" font-size="10">Dedup check</text>

  <!-- Arrow: Extract -> Consolidate -->
  <line x1="614" y1="124" x2="640" y2="124" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <circle cx="614" cy="124" r="3" fill="#22c55e"/>

  <!-- Consolidate -->
  <rect x="645" y="72" width="155" height="104" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="722" y="94" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Consolidate</text>
  <line x1="657" y1="102" x2="788" y2="102" stroke="#d0d0d0" stroke-width="1"/>
  <text x="657" y="120" fill="#888888" font-size="11">files >= 10 triggers</text>
  <text x="657" y="136" fill="#888888" font-size="11">Dedup · Merge · Prune</text>
  <text x="657" y="154" fill="#888888" font-size="10">Four-layer gating</text>

  <!-- ═══════════ Row 2: Memory Files (dashed) ═══════════ -->

  <rect x="20" y="210" width="780" height="48" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="410" y="232" fill="#1a1a1a" font-size="13" text-anchor="middle" font-family="monospace">.memory/</text>
  <text x="410" y="248" fill="#888888" font-size="10" text-anchor="middle">MEMORY.md index + *.md files (YAML frontmatter: name / description / type)</text>

  <!-- Arrow: Store -> Memory Files (write/read) -->
  <path d="M 107 176 L 107 210" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <circle cx="107" cy="176" r="3" fill="#22c55e"/>
  <text x="115" y="198" fill="#22c55e" font-size="10" font-weight="600">write/read</text>

  <!-- Arrow: Extract -> Memory Files (write) -->
  <path d="M 525 176 L 525 210" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <circle cx="525" cy="176" r="3" fill="#22c55e"/>
  <text x="533" y="198" fill="#22c55e" font-size="10" font-weight="600">write</text>

  <!-- Arrow: Consolidate -> Memory Files (overwrite) -->
  <path d="M 722 176 L 722 210" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <circle cx="722" cy="176" r="3" fill="#22c55e"/>
  <text x="730" y="198" fill="#22c55e" font-size="10" font-weight="600">overwrite</text>

  <!-- ═══════════ Row 3: Four Memory Types ═══════════ -->

  <rect x="20" y="282" width="780" height="68" rx="8" fill="#fafafa" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="40" y="306" fill="#1a1a1a" font-size="13" font-weight="700">Four Memory Types</text>
  <line x1="32" y1="314" x2="788" y2="314" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Type labels in a row -->
  <text x="55" y="336" fill="#22c55e" font-size="12" font-weight="700" font-family="monospace">user</text>
  <text x="100" y="336" fill="#888888" font-size="11">who you are</text>

  <text x="250" y="336" fill="#22c55e" font-size="12" font-weight="700" font-family="monospace">feedback</text>
  <text x="322" y="336" fill="#888888" font-size="11">how to work</text>

  <text x="460" y="336" fill="#22c55e" font-size="12" font-weight="700" font-family="monospace">project</text>
  <text x="527" y="336" fill="#888888" font-size="11">what's happening</text>

  <text x="645" y="336" fill="#22c55e" font-size="12" font-weight="700" font-family="monospace">reference</text>
  <text x="726" y="336" fill="#888888" font-size="11">where to find</text>

  <!-- Separator dots -->
  <circle cx="230" cy="333" r="2" fill="#d0d0d0"/>
  <circle cx="443" cy="333" r="2" fill="#d0d0d0"/>
  <circle cx="630" cy="333" r="2" fill="#d0d0d0"/>

  <!-- ═══════════ Row 4: Implementation Notes (terminal style) ═══════════ -->

  <rect x="20" y="376" width="780" height="164" rx="4" fill="#2d2d2d"/>

  <!-- Terminal title bar -->
  <circle cx="38" cy="392" r="5" fill="#1a1a1a" stroke="#888888" stroke-width="0.5"/>
  <circle cx="54" cy="392" r="5" fill="#1a1a1a" stroke="#888888" stroke-width="0.5"/>
  <circle cx="70" cy="392" r="5" fill="#1a1a1a" stroke="#888888" stroke-width="0.5"/>
  <text x="410" y="396" fill="#888888" font-size="11" text-anchor="middle" font-family="monospace">Implementation Notes</text>

  <line x1="32" y1="406" x2="788" y2="406" stroke="#888888" stroke-width="0.5" opacity="0.3"/>

  <!-- Note 1: Memory Selection -->
  <text x="40" y="426" fill="#22c55e" font-size="11" font-family="monospace">$ memory-selection</text>
  <text x="40" y="444" fill="#d0d0d0" font-size="11" font-family="monospace">  LLM side-query (Sonnet selects), not embedding similarity</text>

  <!-- Note 2: Extraction Timing -->
  <text x="40" y="468" fill="#22c55e" font-size="11" font-family="monospace">$ extraction-timing</text>
  <text x="40" y="486" fill="#d0d0d0" font-size="11" font-family="monospace">  Triggered in stop hook (after each turn), not after autoCompact</text>

  <!-- Note 3: Dream Consolidation -->
  <text x="40" y="510" fill="#22c55e" font-size="11" font-family="monospace">$ dream-consolidation</text>
  <text x="40" y="528" fill="#d0d0d0" font-size="11" font-family="monospace">  Four gates: time >=24h + sessions >=5 + scan throttle + file lock</text>
</svg>