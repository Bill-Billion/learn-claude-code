<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 514" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="514" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Background Tasks</text>
  <text x="400" y="48" fill="#888888" font-size="12" text-anchor="middle">Slow operations go to background threads; agent continues processing</text>

  <!-- ===== Row 1: Agent Loop Flow ===== -->

  <!-- messages box -->
  <rect x="30" y="74" width="100" height="42" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="80" y="100" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">messages</text>

  <!-- arrow messages → prompt -->
  <line x1="130" y1="95" x2="152" y2="95" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- prompt + cache box -->
  <rect x="158" y="74" width="130" height="42" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="223" y="100" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">prompt + cache</text>

  <!-- arrow prompt → LLM -->
  <line x1="288" y1="95" x2="310" y2="95" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- LLM call box -->
  <rect x="316" y="74" width="100" height="42" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="366" y="100" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">LLM call</text>

  <!-- arrow LLM → TOOL DISPATCH -->
  <line x1="416" y1="95" x2="438" y2="95" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- TOOL DISPATCH box -->
  <rect x="444" y="68" width="240" height="54" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="564" y="87" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">TOOL DISPATCH</text>
  <text x="464" y="103" fill="#888888" font-size="11">fast → sync execute</text>
  <text x="464" y="115" fill="#22c55e" font-size="11" font-weight="600">slow → run_in_background</text>

  <!-- Loop-back dashed arrow from TOOL DISPATCH to messages (routed over the top) -->
  <path d="M 684 95 L 720 95 L 720 58 L 80 58 L 80 74" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-green)"/>
  <circle cx="720" cy="95" r="3" fill="#22c55e"/>
  <text x="145" y="54" fill="#888888" font-size="10" text-anchor="middle">next turn</text>

  <!-- ===== Row 2: Background Execution + Notification Injection ===== -->

  <!-- Arrow from TOOL DISPATCH down to Background Execution -->
  <path d="M 500 122 L 500 150 L 230 150 L 230 176" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <circle cx="500" cy="150" r="3" fill="#22c55e"/>
  <text x="370" y="146" fill="#888888" font-size="10" text-anchor="middle">slow op</text>

  <!-- Background Thread Execution box -->
  <rect x="40" y="176" width="340" height="94" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="210" y="198" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">Background Thread Execution</text>
  <!-- terminal mockup -->
  <rect x="52" y="206" width="316" height="54" rx="4" fill="#2d2d2d"/>
  <text x="62" y="222" fill="#22c55e" font-size="11" font-family="monospace">start_background_task(block)</text>
  <text x="62" y="237" fill="#22c55e" font-size="11" font-family="monospace">Thread(target=worker, daemon=True)</text>
  <text x="62" y="252" fill="#22c55e" font-size="11" font-family="monospace">result → background_results[id]</text>

  <!-- Arrow: background → notification -->
  <line x1="380" y1="223" x2="418" y2="223" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="399" y="216" fill="#888888" font-size="10" text-anchor="middle">done</text>

  <!-- Notification Injection box -->
  <rect x="424" y="176" width="340" height="94" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="594" y="198" fill="#1a1a1a" font-size="13" font-weight="700" text-anchor="middle">Notification Injection</text>
  <!-- terminal mockup -->
  <rect x="436" y="206" width="316" height="54" rx="4" fill="#2d2d2d"/>
  <text x="446" y="222" fill="#22c55e" font-size="11" font-family="monospace">collect_background_results()</text>
  <text x="446" y="237" fill="#22c55e" font-size="11" font-family="monospace">done → inject tool_result</text>
  <text x="446" y="252" fill="#22c55e" font-size="11" font-family="monospace">pending → "[Running...]" placeholder</text>

  <!-- Arrow: notification back to messages -->
  <path d="M 594 270 L 594 290 L 14 290 L 14 95 L 30 95" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-gray)"/>
  <circle cx="594" cy="290" r="3" fill="#888888"/>
  <circle cx="14" cy="95" r="3" fill="#888888"/>
  <text x="304" y="304" fill="#888888" font-size="10" text-anchor="middle">inject into messages</text>

  <!-- ===== Row 3: Heuristic Judgment ===== -->
  <rect x="40" y="318" width="724" height="50" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="340" fill="#1a1a1a" font-size="13" font-weight="700">Heuristic:</text>

  <!-- fast badge -->
  <rect x="148" y="328" width="50" height="22" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
  <text x="173" y="344" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle">fast</text>
  <text x="208" y="344" fill="#888888" font-size="11">read_file · git status · glob</text>

  <!-- slow badge -->
  <rect x="430" y="328" width="50" height="22" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
  <text x="455" y="344" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle">slow</text>
  <text x="490" y="344" fill="#888888" font-size="11">npm install · pip install · pytest (&gt;30s)</text>

  <!-- ===== Row 4: Timeline Comparison ===== -->

  <!-- Sync Blocking -->
  <rect x="40" y="386" width="348" height="114" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="214" y="410" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Sync Blocking</text>
  <text x="214" y="426" fill="#888888" font-size="11" text-anchor="middle">Agent waits for slow operation</text>

  <!-- Timeline bar: think -->
  <rect x="60" y="440" width="70" height="20" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
  <text x="95" y="454" fill="#1a1a1a" font-size="10" text-anchor="middle">think</text>

  <!-- Timeline bar: waiting (dashed) -->
  <rect x="134" y="440" width="176" height="20" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="222" y="454" fill="#888888" font-size="10" text-anchor="middle">waiting... 3 min idle</text>

  <!-- Timeline bar: resume -->
  <rect x="314" y="440" width="60" height="20" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
  <text x="344" y="454" fill="#1a1a1a" font-size="10" text-anchor="middle">resume</text>

  <text x="60" y="486" fill="#888888" font-size="11">Total ~3 min, agent idle the entire time</text>

  <!-- Background Execution -->
  <rect x="412" y="386" width="352" height="114" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="588" y="410" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Background Execution</text>
  <text x="588" y="426" fill="#22c55e" font-size="11" text-anchor="middle">Agent continues while task runs</text>

  <!-- Timeline bar: think -->
  <rect x="432" y="440" width="70" height="20" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
  <text x="467" y="454" fill="#1a1a1a" font-size="10" text-anchor="middle">think</text>

  <!-- Timeline bar: do other work -->
  <rect x="506" y="440" width="116" height="20" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="564" y="454" fill="#22c55e" font-size="10" text-anchor="middle">do other work</text>

  <!-- Timeline bar: result arrives -->
  <rect x="626" y="440" width="122" height="20" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="687" y="454" fill="#22c55e" font-size="10" text-anchor="middle">result arrives</text>

  <text x="432" y="486" fill="#22c55e" font-size="11">Total ~3 min, but agent stayed productive</text>
</svg>