<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
    <marker id="arrow-black" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="740" height="600" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="370" y="32" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Tool Dispatch</text>
  <text x="370" y="50" fill="#888888" font-size="12" text-anchor="middle">Loop unchanged — add one handler mapping per tool</text>

  <!-- Separator line -->
  <line x1="40" y1="64" x2="700" y2="64" stroke="#d0d0d0" stroke-width="1"/>

  <!-- ===== User Input ===== -->
  <rect x="80" y="88" width="170" height="52" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="165" y="110" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle">User Input</text>
  <text x="165" y="128" fill="#888888" font-size="11" font-family="monospace" text-anchor="middle">messages[]</text>

  <!-- Arrow: User → LLM -->
  <line x1="250" y1="114" x2="308" y2="114" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- LLM -->
  <rect x="310" y="88" width="170" height="52" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="395" y="110" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">LLM</text>
  <text x="395" y="128" fill="#888888" font-size="11" font-family="monospace" text-anchor="middle">stop_reason check</text>

  <!-- Arrow: LLM → Decision -->
  <line x1="395" y1="140" x2="395" y2="170" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Decision Diamond -->
  <polygon points="395,174 470,210 395,246 320,210" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="395" y="213" fill="#1a1a1a" font-size="11" font-weight="600" font-family="monospace" text-anchor="middle">tool_use?</text>

  <!-- No → Return Result -->
  <line x1="470" y1="210" x2="528" y2="210" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="498" y="202" fill="#888888" font-size="10" font-weight="600">No</text>
  <rect x="530" y="192" width="130" height="36" rx="18" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="595" y="214" fill="#888888" font-size="12" font-weight="600" text-anchor="middle">Return Result</text>

  <!-- Yes → Dispatch Map -->
  <line x1="395" y1="246" x2="395" y2="284" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="408" y="268" fill="#22c55e" font-size="10" font-weight="600">Yes</text>

  <!-- ===== TOOL_HANDLERS Dispatch Map (dashed border) ===== -->
  <rect x="110" y="284" width="530" height="200" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Terminal-style header inside dispatch map -->
  <rect x="130" y="296" width="490" height="28" rx="4" fill="#2d2d2d"/>
  <text x="150" y="315" fill="#22c55e" font-size="12" font-family="monospace" font-weight="600">TOOL_HANDLERS  {name: handler}</text>

  <!-- Tool handler boxes: row 1 (3 tools) -->
  <!-- bash -->
  <rect x="140" y="340" width="148" height="44" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="214" y="358" fill="#1a1a1a" font-size="12" font-weight="600" font-family="monospace" text-anchor="middle">bash</text>
  <text x="214" y="374" fill="#888888" font-size="10" font-family="monospace" text-anchor="middle">run_bash()</text>

  <!-- read_file -->
  <rect x="302" y="340" width="148" height="44" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="376" y="358" fill="#1a1a1a" font-size="12" font-weight="600" font-family="monospace" text-anchor="middle">read_file</text>
  <text x="376" y="374" fill="#888888" font-size="10" font-family="monospace" text-anchor="middle">run_read()</text>

  <!-- write_file -->
  <rect x="464" y="340" width="148" height="44" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="538" y="358" fill="#1a1a1a" font-size="12" font-weight="600" font-family="monospace" text-anchor="middle">write_file</text>
  <text x="538" y="374" fill="#888888" font-size="10" font-family="monospace" text-anchor="middle">run_write()</text>

  <!-- Tool handler boxes: row 2 (2 tools) -->
  <!-- edit_file -->
  <rect x="220" y="400" width="148" height="44" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="294" y="418" fill="#1a1a1a" font-size="12" font-weight="600" font-family="monospace" text-anchor="middle">edit_file</text>
  <text x="294" y="434" fill="#888888" font-size="10" font-family="monospace" text-anchor="middle">run_edit()</text>

  <!-- glob -->
  <rect x="382" y="400" width="148" height="44" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="456" y="418" fill="#1a1a1a" font-size="12" font-weight="600" font-family="monospace" text-anchor="middle">glob</text>
  <text x="456" y="434" fill="#888888" font-size="10" font-family="monospace" text-anchor="middle">run_glob()</text>

  <!-- ===== Loop-back arrow: dispatch → messages (dashed green) ===== -->
  <!-- Junction dot at exit point -->
  <circle cx="110" cy="394" r="3" fill="#22c55e"/>
  <path d="M 110 394 L 48 394 Q 40 394 40 386 L 40 122 Q 40 114 48 114 L 78 114" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="52" y="260" fill="#22c55e" font-size="10" font-weight="500" font-family="monospace">tool_result</text>
  <text x="52" y="274" fill="#22c55e" font-size="10" font-weight="500" font-family="monospace">→ messages[]</text>

  <!-- ===== Legend ===== -->
  <line x1="40" y1="514" x2="700" y2="514" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Legend: terminal box for key code change -->
  <rect x="60" y="530" width="620" height="52" rx="4" fill="#2d2d2d"/>
  <text x="80" y="552" fill="#888888" font-size="11" font-family="monospace">Loop change (1 line):</text>
  <text x="80" y="572" fill="#22c55e" font-size="12" font-family="monospace">- run_bash()  →  TOOL_HANDLERS[block.name](**block.input)</text>
</svg>