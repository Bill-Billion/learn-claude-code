<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 580" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ag" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#22c55e"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#888888"/>
    </marker>
  </defs>

  <rect width="660" height="580" fill="#ffffff"/>

  <!-- title -->
  <text x="290" y="32" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Agent Loop</text>
  <text x="290" y="52" fill="#888888" font-size="12" text-anchor="middle">a while True loop drives the entire agent</text>

  <!-- ====== 1. User Query ====== -->
  <rect x="160" y="72" width="260" height="44" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="290" y="99" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">User Query</text>

  <line x1="290" y1="116" x2="290" y2="144" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>

  <!-- ====== 2. messages[] ====== -->
  <rect x="160" y="150" width="260" height="56" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="290" y="175" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle" font-family="monospace">messages[]</text>
  <text x="290" y="195" fill="#888888" font-size="11" text-anchor="middle">accumulated message history</text>

  <line x1="290" y1="206" x2="290" y2="234" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>

  <!-- ====== 3. LLM Call ====== -->
  <rect x="130" y="240" width="320" height="66" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="290" y="265" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">LLM Call</text>
  <line x1="150" y1="275" x2="430" y2="275" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="290" y="296" fill="#888888" font-size="11" text-anchor="middle" font-family="monospace">messages.create( model, messages, tools )</text>

  <line x1="290" y1="306" x2="290" y2="338" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>

  <!-- ====== 4. Decision ====== -->
  <polygon points="290,344 450,392 290,440 130,392" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="290" y="396" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle" font-family="monospace">stop_reason == "tool_use" ?</text>

  <!-- No → Exit -->
  <line x1="450" y1="392" x2="518" y2="392" stroke="#888888" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="482" y="383" fill="#888888" font-size="10" font-weight="600" text-anchor="middle">No</text>
  <rect x="524" y="372" width="100" height="40" rx="20" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="574" y="396" fill="#888888" font-size="13" font-weight="700" text-anchor="middle">Return</text>

  <!-- Yes → Tool Exec -->
  <line x1="290" y1="440" x2="290" y2="468" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>
  <text x="304" y="460" fill="#22c55e" font-size="10" font-weight="600">Yes</text>

  <!-- ====== 5. Tool Execution ====== -->
  <rect x="160" y="474" width="260" height="74" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="290" y="498" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">Execute Tool</text>
  <line x1="180" y1="506" x2="400" y2="506" stroke="#d0d0d0" stroke-width="0.5"/>
  <rect x="180" y="514" width="220" height="24" rx="4" fill="#2d2d2d"/>
  <text x="194" y="531" fill="#22c55e" font-size="11" font-family="monospace">$ run_bash(command)</text>
  <rect x="383" y="522" width="7" height="11" fill="#22c55e" opacity="0.7"/>

  <!-- ====== loop-back line ====== -->
  <!-- Tool Exec bottom -> down -> left -> up -> into messages[] left side -->
  <circle cx="290" cy="548" r="3" fill="#22c55e"/>
  <path d="M290 551 L290 562 Q290 572 280 572 L46 572 Q36 572 36 562 L36 178 Q36 168 46 168 L158 168"
        fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#ag)"/>
  <circle cx="160" cy="168" r="3" fill="#22c55e"/>

  <!-- loop-back label: horizontal along bottom segment -->
  <text x="160" y="566" fill="#888888" font-size="10" font-weight="600" text-anchor="middle">append tool_result to messages</text>
</svg>
