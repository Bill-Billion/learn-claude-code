<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="430" y="34" fill="#1a1a1a" font-size="20" font-weight="700" text-anchor="middle">Skill Loading</text>
  <text x="430" y="52" fill="#888888" font-size="12" text-anchor="middle">Inject catalog at startup, load content on demand at runtime</text>

  <!-- ===== MAIN FLOW ===== -->

  <!-- messages[] (dashed border = mutable) -->
  <rect x="30" y="92" width="130" height="48" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="95" y="121" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">messages[]</text>

  <!-- Arrow: messages[] -> LLM -->
  <line x1="160" y1="116" x2="198" y2="116" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- LLM box -->
  <rect x="200" y="92" width="100" height="48" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="250" y="121" fill="#1a1a1a" font-size="14" font-weight="700" text-anchor="middle">LLM</text>

  <!-- Arrow: LLM -> Decision diamond -->
  <line x1="300" y1="116" x2="310" y2="116" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Decision diamond: stop_reason == tool_use? -->
  <polygon points="332,96 354,116 332,136 310,116" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="332" y="120" fill="#1a1a1a" font-size="8" font-weight="600" text-anchor="middle" font-family="monospace">tool</text>
  <text x="332" y="88" fill="#888888" font-size="9" text-anchor="middle" font-family="monospace">stop_reason?</text>

  <!-- Arrow: Diamond -> Return Result (No path, downward) -->
  <line x1="332" y1="136" x2="332" y2="180" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="346" y="162" fill="#888888" font-size="10" font-weight="600">No</text>

  <!-- Return Result (pill shape) -->
  <rect x="275" y="182" width="114" height="32" rx="16" fill="#ffffff" stroke="#888888" stroke-width="1.5"/>
  <text x="332" y="203" fill="#888888" font-size="12" font-weight="600" text-anchor="middle">Return Result</text>

  <!-- Arrow: Diamond -> PreToolUse (Yes path, rightward) -->
  <line x1="354" y1="116" x2="394" y2="116" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="371" y="108" fill="#22c55e" font-size="10" font-weight="600">Yes</text>

  <!-- PreToolUse box -->
  <rect x="396" y="92" width="116" height="48" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="454" y="113" fill="#1a1a1a" font-size="11" font-weight="600" text-anchor="middle" font-family="monospace">trigger_hooks</text>
  <text x="454" y="129" fill="#888888" font-size="10" text-anchor="middle">PreToolUse</text>

  <!-- Arrow: PreToolUse -> TOOL_HANDLERS -->
  <line x1="512" y1="116" x2="548" y2="116" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ===== TOOL_HANDLERS container ===== -->
  <rect x="550" y="74" width="140" height="168" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="620" y="96" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle">TOOL_HANDLERS</text>

  <!-- Tool row 1 -->
  <rect x="562" y="106" width="116" height="22" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="620" y="121" fill="#1a1a1a" font-size="10" text-anchor="middle" font-family="monospace">bash  read  write</text>

  <!-- Tool row 2 -->
  <rect x="562" y="134" width="116" height="22" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="620" y="149" fill="#1a1a1a" font-size="10" text-anchor="middle" font-family="monospace">edit  glob  todo</text>

  <!-- Tool row 3 -->
  <rect x="562" y="162" width="116" height="22" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="620" y="177" fill="#1a1a1a" font-size="10" text-anchor="middle" font-family="monospace">task (subagent)</text>

  <!-- Tool row 4: load_skill (green accent) -->
  <rect x="562" y="192" width="116" height="26" rx="4" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="620" y="210" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle" font-family="monospace">load_skill</text>

  <!-- ===== Loop-back arrow (dashed green) ===== -->
  <path d="M 620 242 L 620 300 Q 620 310 610 310 L 105 310 Q 95 310 95 300 L 95 140" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <circle cx="620" cy="300" r="3" fill="#22c55e"/>
  <circle cx="95" cy="300" r="3" fill="#22c55e"/>
  <text x="358" y="330" fill="#888888" font-size="11" text-anchor="middle">Result appended to messages[], loop continues</text>

  <!-- ===== TWO-LEVEL INJECTION (right side) ===== -->

  <!-- Level 1: build_system() -->
  <rect x="720" y="74" width="120" height="80" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="780" y="96" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">Level 1</text>
  <text x="780" y="114" fill="#1a1a1a" font-size="10" font-weight="600" text-anchor="middle" font-family="monospace">build_system()</text>
  <text x="780" y="130" fill="#888888" font-size="9" text-anchor="middle">Scan skills/ at</text>
  <text x="780" y="142" fill="#888888" font-size="9" text-anchor="middle">startup</text>

  <!-- Level 2: load_skill(name) -->
  <rect x="720" y="168" width="120" height="74" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="780" y="188" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">Level 2</text>
  <text x="780" y="206" fill="#1a1a1a" font-size="10" font-weight="600" text-anchor="middle" font-family="monospace">load_skill()</text>
  <text x="780" y="222" fill="#888888" font-size="9" text-anchor="middle">Read full SKILL.md</text>
  <text x="780" y="234" fill="#888888" font-size="9" text-anchor="middle">at runtime</text>

  <!-- Arrow: Level 1 -> LLM system prompt (dashed, via top) -->
  <path d="M 780 74 L 780 72 Q 780 64 772 64 L 258 64 Q 250 64 250 72 L 250 92" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <circle cx="780" cy="72" r="3" fill="#22c55e"/>

  <!-- Terminal label on the Level 1 -> LLM path -->
  <rect x="430" y="56" width="220" height="16" rx="4" fill="#2d2d2d"/>
  <text x="540" y="67" fill="#22c55e" font-size="9" font-family="monospace" text-anchor="middle">SYSTEM += skill catalog</text>

  <!-- Arrow: Level 2 -> load_skill in TOOL_HANDLERS (dashed) -->
  <line x1="720" y1="205" x2="678" y2="205" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <circle cx="678" cy="205" r="3" fill="#22c55e"/>

  <!-- ===== BOTTOM TABLE: Two-Level Comparison ===== -->

  <!-- Table container -->
  <rect x="30" y="360" width="800" height="145" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Table header background -->
  <rect x="30" y="360" width="800" height="30" rx="8" fill="#fafafa" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Cover bottom corners of header so only top is rounded -->
  <rect x="30" y="378" width="800" height="12" fill="#fafafa"/>

  <!-- Header text -->
  <text x="110" y="381" fill="#1a1a1a" font-size="11" font-weight="700" text-anchor="middle">Level</text>
  <text x="275" y="381" fill="#1a1a1a" font-size="11" font-weight="700" text-anchor="middle">Location</text>
  <text x="470" y="381" fill="#1a1a1a" font-size="11" font-weight="700" text-anchor="middle">Timing</text>
  <text x="690" y="381" fill="#1a1a1a" font-size="11" font-weight="700" text-anchor="middle">Cost</text>

  <!-- Column dividers -->
  <line x1="180" y1="360" x2="180" y2="505" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="370" y1="360" x2="370" y2="505" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="580" y1="360" x2="580" y2="505" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Row dividers -->
  <line x1="30" y1="390" x2="830" y2="390" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="30" y1="445" x2="830" y2="445" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Row 1: Catalog -->
  <text x="110" y="420" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle">1. Catalog</text>
  <text x="275" y="414" fill="#1a1a1a" font-size="10" text-anchor="middle" font-family="monospace">system prompt</text>
  <text x="275" y="430" fill="#888888" font-size="9" text-anchor="middle">(name + description)</text>
  <text x="470" y="420" fill="#1a1a1a" font-size="10" text-anchor="middle">Injected at startup</text>
  <text x="690" y="414" fill="#1a1a1a" font-size="10" text-anchor="middle" font-family="monospace">~100 tokens/skill</text>
  <text x="690" y="430" fill="#888888" font-size="9" text-anchor="middle">carried every turn</text>

  <!-- Row 2: Content -->
  <text x="110" y="478" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle">2. Content</text>
  <text x="275" y="470" fill="#1a1a1a" font-size="10" text-anchor="middle" font-family="monospace">tool_result</text>
  <text x="275" y="486" fill="#888888" font-size="9" text-anchor="middle">(full SKILL.md)</text>
  <text x="470" y="478" fill="#1a1a1a" font-size="10" text-anchor="middle">Agent calls load_skill</text>
  <text x="690" y="470" fill="#1a1a1a" font-size="10" text-anchor="middle" font-family="monospace">~2000 tokens/skill</text>
  <text x="690" y="486" fill="#888888" font-size="9" text-anchor="middle">on demand only</text>

</svg>